function onProdSelect(rowId, sel) {
  const opt = sel.options[sel.selectedIndex];
  const prodId = sel.value;
  const ap = parseFloat(opt.dataset.ap)||0;
  const fp = parseFloat(opt.dataset.fp)||0;
  const unit = opt.dataset.unit||'';
  const unitEl = document.getElementById(rowId+'_unit');
  const priceEl = document.getElementById(rowId+'_price');
  if (unitEl) unitEl.textContent = unit||'-';
  if (priceEl) priceEl.value = ap;
  const item = currentInvoiceItems.find(it=>it.rowId===rowId);
  if (item) { item.product_id=prodId; item.product_name=opt.textContent.trim(); item.factory_price=fp; item.unit=unit; item.unit_price=ap; }
  calcRowTotal(rowId);
}
function calcRowTotal(rowId) {
  const qty = parseFloat(document.getElementById(rowId+'_qty')?.value)||0;
  const price = parseFloat(document.getElementById(rowId+'_price')?.value)||0;
  const disc = parseFloat(document.getElementById(rowId+'_disc')?.value)||0;
  const total = qty * price * (1 - disc/100);
  const el = document.getElementById(rowId+'_total');
  if (el) el.textContent = total.toFixed(2);
  const item = currentInvoiceItems.find(it=>it.rowId===rowId);
  if (item) { item.qty=qty; item.unit_price=price; item.discount=disc; item.total=total; }
  updateInvoiceTotals();
}
function removeInvRow(rowId) {
  const el = document.getElementById(rowId);
  if (el) el.remove();
  currentInvoiceItems = currentInvoiceItems.filter(it=>it.rowId!==rowId);
  updateInvoiceTotals();
}
function updateInvoiceTotals() {
  const showFactory = canViewProfit();
  let gross = 0, disc = 0;
  currentInvoiceItems.forEach(it=>{
    const g = it.qty * it.unit_price;
    gross += g;
    disc += g - it.total;
  });
  const net = gross - disc;
  const date = document.getElementById('inv-date')?.value || '';
  const custId = document.getElementById('inv-customer')?.value || '';
  const cust = appState.customers.find(c=>c.id===custId);
  const agentDisc = getAgentDiscountForDate(date, cust?.category||'');
  const factory = gross * (1 - agentDisc / 100);
  const fmt = v => v.toFixed(2)+' '+appState.settings.currency;
  const setEl = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
  setEl('inv-gross', fmt(gross)); setEl('inv-disc', fmt(disc)); setEl('inv-net', fmt(net));
  if (showFactory) setEl('inv-factory', fmt(factory));
}
async function saveInvoice() {
  const custId = document.getElementById('inv-customer')?.value;
  const date = document.getElementById('inv-date')?.value;
  const errEl = document.getElementById('inv-err');
  if (!custId) { errEl.style.display='block'; errEl.textContent='يرجى اختيار العميل'; return; }
  if (!date) { errEl.style.display='block'; errEl.textContent='يرجى اختيار تاريخ الفاتورة'; return; }
  const validItems = currentInvoiceItems.filter(it=>it.product_id && it.qty>0);
  if (!validItems.length) { errEl.style.display='block'; errEl.textContent='يرجى إضافة بند واحد على الأقل'; return; }
  const cust = appState.customers.find(c=>c.id===custId);
  let gross=0,disc=0;
  validItems.forEach(it=>{ const g=it.qty*it.unit_price; gross+=g; disc+=g-it.total; });
  const net = gross - disc;
  const agentDiscSave = getAgentDiscountForDate(date, cust?.category||'');
  const factory = gross * (1 - agentDiscSave / 100);
  appState.invoices = await dbGet('invoices');
  const invId = generateId();
  let serial = generateInvoiceSerial();
  if (supabaseClient && appState.supabaseConfigured) {
    let attempts = 0;
    while (attempts < MAX_SERIAL_RETRY_ATTEMPTS) {
      const {data} = await supabaseClient.from('invoices').select('id').eq('serial',serial).maybeSingle();
      if (!data) break;
      const parts = serial.split('-');
      const n = parseInt(parts.pop())+1;
      parts.push(String(n).padStart(4,'0'));
      serial = parts.join('-');
      attempts++;
    }
  }
  const rep = document.getElementById('inv-rep')?.value||'';
  const notes = document.getElementById('inv-notes')?.value||'';
  const invoice = {
    id:invId, serial, date, customer_id:custId, customer_name:cust.name,
    sales_rep:rep, gross_amount:gross, discount_amount:disc, net_amount:net,
    factory_amount:factory, notes, status:'active', delivery_status:'in_progress', created_by:appState.currentUser.name, created_at:new Date().toISOString()
  };
  await dbSave('invoices', invoice);
  const savedItems = [];
  for (const it of validItems) {
    const color = document.getElementById(it.rowId+'_color')?.value||'';
    const note = document.getElementById(it.rowId+'_note')?.value||'';
    const item = {
      id:generateId(), invoice_id:invId, product_id:it.product_id,
      product_name:it.product_name, unit:it.unit, qty:it.qty,
      unit_price:it.unit_price, factory_price:parseFloat((it.unit_price*(1-agentDiscSave/100)).toFixed(4)), discount:it.discount, total:it.total, color, note
    };
    await dbSave('invoice_items', item);
    savedItems.push(item);
  }
  appState.invoices = await dbGet('invoices');
  ensureStateEntry(invoice, appState.invoices);
  appState.invoiceItems = await dbGet('invoice_items');
  savedItems.forEach(it => ensureStateEntry(it, appState.invoiceItems));
  closeModal();
  logActivity('إضافة فاتورة', 'الفواتير', 'إضافة فاتورة: '+serial+' للعميل: '+(cust?.name||custId));
  showToast('تم حفظ الفاتورة '+serial+' بنجاح','success');
  renderInvoices();
}

async function deleteInvoiceFromRepair(id) {
  const inv = appState.invoices.find(i=>i.id===id);
  if (!confirm('حذف الفاتورة "'+((inv&&inv.serial)||id)+'" نهائياً؟')) return;
  await dbDelete('invoices', id);
  if (supabaseClient && appState.supabaseConfigured) {
    try { await supabaseClient.from('invoice_items').delete().eq('invoice_id', id); } catch(e) {}
  }
  appState.invoices = await dbGet('invoices');
  appState.invoiceItems = await dbGet('invoice_items');
  showToast('تم حذف الفاتورة','success');
  closeModal();
  renderInvoices();
  const remaining2 = appState.invoices.filter(inv=>!isValidDate(inv.date));
  if (remaining2.length) openRepairInvalidDatesModal();
}
async function saveRepairDates() {
  const inputs = document.querySelectorAll('[id^="repair-date-"]');
  let fixed = 0, skipped = 0;
  for (const inp of inputs) {
    const invId = inp.dataset.invId;
    const newDate = inp.value.trim();
    if (!newDate) { skipped++; continue; }
    if (!isValidDate(newDate)) { showToast('التاريخ "'+newDate+'" غير صالح','error'); return; }
    const inv = appState.invoices.find(i=>i.id===invId);
    if (!inv) continue;
    inv.date = newDate;
    await dbSave('invoices', inv);
    fixed++;
  }
  appState.invoices = await dbGet('invoices');
  closeModal();
  if (fixed) {
    logActivity('إصلاح تواريخ', 'الفواتير', 'تصحيح '+fixed+' فاتورة');
    showToast('تم تصحيح '+fixed+' فاتورة'+(skipped?' وتجاهل '+skipped+' (بدون تاريخ)':''),'success');
  } else {
    showToast('لم يتم تصحيح أي فاتورة — يرجى إدخال تاريخ لكل سطر','warning');
  }
  renderInvoices();
}

async function saveEditInvoice(id) {
  if (!canDo('invoices','edit')) { showToast('ليس لديك صلاحية تعديل الفواتير','error'); return; }
  const custId = document.getElementById('inv-customer')?.value;
  const date = document.getElementById('inv-date')?.value;
  const errEl = document.getElementById('inv-err');
  if (!custId) { errEl.style.display='block'; errEl.textContent='يرجى اختيار العميل'; return; }
  if (!date) { errEl.style.display='block'; errEl.textContent='يرجى اختيار تاريخ الفاتورة'; return; }
  const validItems = currentInvoiceItems.filter(it=>it.product_id && it.qty>0);
  if (!validItems.length) { errEl.style.display='block'; errEl.textContent='يرجى إضافة بند واحد على الأقل'; return; }
  const cust = appState.customers.find(c=>c.id===custId);
  let gross=0,disc=0;
  validItems.forEach(it=>{ const g=it.qty*it.unit_price; gross+=g; disc+=g-it.total; });
  const net = gross - disc;
  const rep = document.getElementById('inv-rep')?.value||'';
  const notes = document.getElementById('inv-notes')?.value||'';
  const inv = appState.invoices.find(i=>i.id===id);
  if (!inv) return;
  // Preserve historical factory_amount when neither gross nor date changed (e.g. notes/rep edit only).
  const agentDiscEdit = getAgentDiscountForDate(date, cust?.category||'');
  const factory = gross * (1 - agentDiscEdit / 100);
  const factoryRatio = gross > 0 ? factory / gross : (1 - agentDiscEdit / 100);
  const edited_at = new Date().toISOString();
  const updated = { ...inv, customer_id:custId, customer_name:cust.name, date, sales_rep:rep,
    gross_amount:gross, discount_amount:disc, net_amount:net, factory_amount:factory, notes,
    edited_by:appState.currentUser.name, edited_at };
  await dbSave('invoices', updated);
  // Delete old items and re-save new ones
  if (supabaseClient && appState.supabaseConfigured) {
    try { await supabaseClient.from('invoice_items').delete().eq('invoice_id', id); } catch(e) {}
  }
  for (const it of validItems) {
    const color = document.getElementById(it.rowId+'_color')?.value||'';
    const note = document.getElementById(it.rowId+'_note')?.value||'';
    await dbSave('invoice_items', {
      id:generateId(), invoice_id:id, product_id:it.product_id,
      product_name:it.product_name, unit:it.unit, qty:it.qty,
      unit_price:it.unit_price, factory_price:parseFloat((it.unit_price*factoryRatio).toFixed(4)), discount:it.discount, total:it.total, color, note
    });
  }
  appState.invoices = await dbGet('invoices');
  appState.invoiceItems = await dbGet('invoice_items');
  closeModal();
  logActivity('تعديل فاتورة', 'الفواتير', 'تعديل فاتورة: '+inv.serial+' للعميل: '+(cust?.name||custId)+' | الصافي: '+net.toFixed(2)+' ج.م');
  showToast('تم تحديث الفاتورة '+inv.serial+' بنجاح','success');
  renderInvoices();
}

    await dbSave('factory_payments', fpEntry);
    appState.factoryPayments = await dbGet('factory_payments');
    ensureStateEntry(fpEntry, appState.factoryPayments);
  } else {
    // All non-factory methods (نقدي المكتب، فودافون المكتب، تحويل بنكي المكتب، شيك المكتب) → وارد المكتب
    if (isOfficeVodafone) {
      // Also record in فودافون كاش as incoming
      const wEntry = {
        id:generateId(), date, direction:'in', category:'تحصيل فودافون - عميل',
        counterparty:cust.name, invoice_serial:record.invoice_serial||'',
        amount, method, balance:0, source_id:record.id,
        notes:'تحصيل فودافون كاش من '+cust.name+(record.invoice_serial?' - '+record.invoice_serial:''),
        created_at:new Date().toISOString()
      };
      await dbSave('wallet_ledger', wEntry);
      appState.walletLedger = await dbGet('wallet_ledger');
      ensureStateEntry(wEntry, appState.walletLedger);
      recalculateWalletBalances();
    }
    // Record in وارد المكتب for all office payment methods
    const oiEntry = {
      id:generateId(), date, amount,
      category:'دخل للمكتب',
      method, reference:record.invoice_serial||'', source_id:record.id,
      notes:'تحصيل '+methodLabel+' من '+cust.name+(record.invoice_serial?' - '+record.invoice_serial:''),
      created_at:new Date().toISOString()
    };
    await dbSave('office_incoming', oiEntry);
    appState.officeIncoming = await dbGet('office_incoming');
    ensureStateEntry(oiEntry, appState.officeIncoming);
  }
  closeModal();
  logActivity(id ? 'تعديل تحصيل' : 'إضافة تحصيل', 'التحصيلات', (id?'تعديل':'إضافة')+' تحصيل من '+(cust?.name||custId)+' بمبلغ '+formatCurrency(amount)+' بطريقة '+methodLabel);
  showToast(id?'تم تحديث التحصيل':'تم تسجيل التحصيل بنجاح','success');
  renderCollections();
}
function deleteCollection(id) {
  const col = appState.collections.find(c=>c.id===id);
  showConfirm('هل تريد حذف هذا التحصيل؟', async function(){
    // Remove any linked wallet, office_incoming and factory_payment entries
    const relatedWallet = appState.walletLedger.filter(e=>e.source_id===id);
    if (relatedWallet.length>0) {
      await Promise.all(relatedWallet.map(e=>dbDelete('wallet_ledger', e.id)));
      appState.walletLedger = await dbGet('wallet_ledger');
    }
    const relatedOI = appState.officeIncoming.filter(e=>e.source_id===id);
    if (relatedOI.length>0) {
      await Promise.all(relatedOI.map(e=>dbDelete('office_incoming', e.id)));
      appState.officeIncoming = await dbGet('office_incoming');
    }
    const relatedFP = appState.factoryPayments.filter(e=>e.source_id===id);
    if (relatedFP.length>0) {
      await Promise.all(relatedFP.map(e=>dbDelete('factory_payments', e.id)));
      appState.factoryPayments = await dbGet('factory_payments');
    }
    recalculateWalletBalances();
    await dbDelete('collections', id);
    appState.collections = await dbGet('collections');
    const details = col ? 'حذف تحصيل: '+col.customer_name+' - '+formatCurrency(col.amount)+(col.date?' ('+col.date+')':'') : 'حذف سجل (غير موجود): '+id;
    logActivity('حذف تحصيل', 'التحصيلات', details);
    showToast('تم حذف التحصيل','success');
    renderCollections();
  });
}

// ==================== مسح تحصيلات السيستم القديم ====================
function deleteOldSystemCollections() {
  const targets = appState.collections.filter(c =>
    (c.notes||'').trim() === 'سداد سيستم قديم' &&
    c.date <= '2026-03-24' &&
    (!c.method || c.method === 'none')
  );
  if (targets.length === 0) { showToast('لا توجد تحصيلات مطابقة للمسح', 'info'); return; }
  showConfirm('هل تريد مسح <b>'+targets.length+'</b> تحصيل (ملاحظات: سداد سيستم قديم، طريقة الدفع: none، تاريخ ≤ 24/03/2026)؟ لا يمكن التراجع.', async function(){
    showToast('جارٍ الحذف... يرجى الانتظار', 'info');
    let deleted = 0, errors = 0;
    for (const col of targets) {
      try {
        const relOI = appState.officeIncoming.filter(e=>e.source_id===col.id);
        if (relOI.length>0) await Promise.all(relOI.map(e=>dbDelete('office_incoming',e.id)));
        const relW = appState.walletLedger.filter(e=>e.source_id===col.id);
        if (relW.length>0) await Promise.all(relW.map(e=>dbDelete('wallet_ledger',e.id)));
        const relFP = appState.factoryPayments.filter(e=>e.source_id===col.id);
        if (relFP.length>0) await Promise.all(relFP.map(e=>dbDelete('factory_payments',e.id)));
        await dbDelete('collections', col.id);
        deleted++;
      } catch(e) {
        console.error('[deleteOldSystemCollections] خطأ:', col.id, e);
        errors++;
      }
    }
    appState.collections = await dbGet('collections');
    appState.officeIncoming = await dbGet('office_incoming');
    appState.walletLedger = await dbGet('wallet_ledger');
    appState.factoryPayments = await dbGet('factory_payments');
    recalculateWalletBalances();
    logActivity('مسح تحصيلات السيستم القديم', 'التحصيلات', 'تم مسح '+deleted+' تحصيل'+(errors>0?' | أخطاء: '+errors:''));
    showToast('تم مسح '+deleted+' تحصيل'+(errors>0?' | أخطاء: '+errors:''), errors>0?'warning':'success');
    renderCollections();
  });
}

    +'</div>'

  html += '</tbody></table></div>'+renderPagination(total, pg, appState.pageSize, 'changeWriteoffsPage')+'</div>';
  setPageContent(html, 'search-writeoffs');

async function saveWriteoff() {
  const custId = document.getElementById('wo-customer')?.value;
  const date = document.getElementById('wo-date')?.value;
  const amountRaw = document.getElementById('wo-amount')?.value;
  const errEl = document.getElementById('wo-err');
  if (!custId) { errEl.style.display='block'; errEl.textContent='يرجى اختيار العميل'; return; }
  if (!date) { errEl.style.display='block'; errEl.textContent='يرجى اختيار التاريخ'; return; }
  if (amountRaw==='' || amountRaw===null || amountRaw===undefined) { errEl.style.display='block'; errEl.textContent='يرجى إدخال المبلغ'; return; }
  const amount = parseFloat(amountRaw);
  if (isNaN(amount)) { errEl.style.display='block'; errEl.textContent='يرجى إدخال رقم صحيح'; return; }
  if (amount===0) { errEl.style.display='block'; errEl.textContent='المبلغ لا يمكن أن يكون صفراً'; return; }
  const cust = appState.customers.find(c=>c.id===custId);
  const record = {
    id: generateId(), date,
    customer_id: custId,
    customer_name: cust ? cust.name : custId,
    amount,
    notes: document.getElementById('wo-notes')?.value.trim()||'',
    created_by: appState.currentUser?.name||'',
    created_at: new Date().toISOString()
  };
  await dbSave('writeoffs', record);
  appState.writeoffs = await dbGet('writeoffs');
  closeModal();
  logActivity('إضافة تصفية حساب', 'مديونيات معدومة', 'تصفية حساب: '+(cust?.name||custId)+' بمبلغ '+formatCurrency(amount));
  showToast('تم تسجيل تصفية الحساب بنجاح','success');
  renderWriteoffs();
}

    +'<i class="fas fa-check-double me-1"></i> تصفية الكل ('+results.length+')</button>'
    +'</div>';

}
function _buildSmallBalanceRecord(r) {
  return {
    id: generateId(), date: new Date().toISOString().split('T')[0],
    customer_id: r.id, customer_name: r.name,
    amount: r.balance,
    notes: 'تصفية تلقائية - مراجعة الأرصدة الصغيرة',
    created_by: appState.currentUser?.name||'',
    created_at: new Date().toISOString()
  };
}
async function writeoffSmallBalance(idx) {
  const r = (window._sbResults||[])[idx];
  if (!r) return;
  // Re-check the current balance at the time of settlement to avoid duplicates
  const currentBal = getCustomerBalance(r.id);
  if (currentBal === 0) { showToast('رصيد '+escHtml(r.name)+' أصبح صفراً — لا حاجة للتصفية', 'info'); searchSmallBalances(); return; }
  await dbSave('writeoffs', _buildSmallBalanceRecord({...r, balance: currentBal}));
  appState.writeoffs = await dbGet('writeoffs');
  logActivity('إضافة تصفية حساب', 'مديونيات معدومة', 'تصفية تلقائية: '+r.name+' بمبلغ '+formatCurrency(currentBal));
  showToast('تم تسجيل تصفية '+escHtml(r.name)+' بنجاح', 'success');
  searchSmallBalances();
  renderWriteoffs();
}
async function writeoffAllSmallBalances() {
  const results = window._sbResults||[];
  if (results.length === 0) return;
  // Clear the cached list immediately to prevent double-click duplicates
  window._sbResults = [];
  let settled = 0;
  for (const r of results) {
    // Re-verify the current balance before each settlement to skip already-settled customers
    const currentBal = getCustomerBalance(r.id);
    if (currentBal === 0) continue;
    await dbSave('writeoffs', _buildSmallBalanceRecord({...r, balance: currentBal}));
    settled++;
  }
  appState.writeoffs = await dbGet('writeoffs');
  if (settled > 0) {
    logActivity('إضافة تصفية حساب', 'مديونيات معدومة', 'تصفية تلقائية جماعية لـ '+settled+' عميل');
    showToast('تم تسجيل تصفية '+settled+' عميل بنجاح', 'success');
  } else {
    showToast('جميع الأرصدة أصبحت صفراً — لا شيء للتصفية', 'info');
  }
  searchSmallBalances();
  renderWriteoffs();
}
function exportWriteoffsToExcel() {
  let items = [...appState.writeoffs];
  const q = (appState.filters.writeoffs||'').toLowerCase();
  const fromF = appState.filters.writeoffsFrom || '';
  const toF = appState.filters.writeoffsTo || '';
  if (q) items = items.filter(w=>(w.customer_name||'').toLowerCase().includes(q)||(w.notes||'').toLowerCase().includes(q));
  if (fromF) items = items.filter(w=>w.date && w.date >= fromF);
  if (toF) items = items.filter(w=>w.date && w.date <= toF);
  items = items.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const headers = ['التاريخ','العميل','المبلغ','ملاحظات','بواسطة'];
  const rows = items.map(w=>[w.date, w.customer_name, w.amount, w.notes||'', w.created_by||'']);
  exportToCsv('مديونيات_معدومة', headers, rows);
}

async function saveWalletEntry() {
  const dir = document.getElementById('wal-dir')?.value;
  const date = document.getElementById('wal-date')?.value;
  const amount = parseFloat(document.getElementById('wal-amount')?.value)||0;
  const errEl = document.getElementById('wal-err');
  if (!date) { errEl.style.display='block'; errEl.textContent='يرجى اختيار التاريخ'; return; }
  if (amount<=0) { errEl.style.display='block'; errEl.textContent='يرجى إدخال مبلغ صحيح'; return; }
  const entry = {
    id:generateId(), date, direction:dir,
    category: document.getElementById('wal-cat')?.value||'',
    counterparty: document.getElementById('wal-cp')?.value.trim()||'',
    invoice_serial:'', amount,
    method: document.getElementById('wal-method')?.value||'cash',
    balance:0,
    notes: document.getElementById('wal-notes')?.value.trim()||'',
    created_at:new Date().toISOString()
  };
  await dbSave('wallet_ledger', entry);
  appState.walletLedger = await dbGet('wallet_ledger');
  recalculateWalletBalances();
  closeModal();
  logActivity('إضافة قيد فودافون كاش', 'فودافون كاش', (dir==='in'?'وارد':'صادر')+' '+formatCurrency(amount));
  showToast('تم إضافة القيد بنجاح','success');
  renderWallet();
}
function deleteWalletEntry(id) {
  showConfirm('هل تريد حذف هذا القيد من المحفظة؟', async function(){
    const entry = appState.walletLedger.find(e=>e.id===id);
    await dbDelete('wallet_ledger', id);
    appState.walletLedger = await dbGet('wallet_ledger');
    recalculateWalletBalances();
    const details = entry ? 'حذف قيد محفظة: '+(entry.direction==='in'?'وارد':'صادر')+' '+formatCurrency(entry.amount)+(entry.counterparty?' - '+entry.counterparty:'')+(entry.date?' ('+entry.date+')':'') : 'حذف سجل (غير موجود): '+id;
    logActivity('حذف قيد فودافون كاش', 'فودافون كاش', details);
    showToast('تم حذف القيد','success');
    renderWallet();
  });
}

async function saveOfficePayment(id) {
  const date = document.getElementById('op-date')?.value;
  const amount = parseFloat(document.getElementById('op-amount')?.value)||0;
  const errEl = document.getElementById('op-err');
  if (!date) { errEl.style.display='block'; errEl.textContent='يرجى اختيار التاريخ'; return; }
  if (!validateAmount(amount)) { errEl.style.display='block'; errEl.textContent='يرجى إدخال مبلغ صحيح أكبر من صفر'; return; }
  const methodSel = document.getElementById('op-method');
  const methodVal = methodSel?.value||'cash';
  const methodLabel = (methodSel && methodSel.options[methodSel.selectedIndex]?.text) || getMethodLabel(methodVal);
  const isOfficeVodafone = methodLabel.includes('فودافون') && !methodLabel.includes('مصنع');
  const record = {
    id:id||generateId(), date, amount,
    category:document.getElementById('op-category')?.value||'أخرى',
    method:methodVal,
    reference:document.getElementById('op-ref')?.value.trim()||'',
    notes:document.getElementById('op-notes')?.value.trim()||'',
    created_at:id?(appState.officePayments.find(p=>p.id===id)?.created_at||new Date().toISOString()):new Date().toISOString()
  };
  // For edits, remove any previously linked wallet entry before re-creating it
  if (id) {
    const oldWalletEntries = appState.walletLedger.filter(e=>e.source_id===id);
    if (oldWalletEntries.length>0) {
      await Promise.all(oldWalletEntries.map(e=>dbDelete('wallet_ledger', e.id)));
      appState.walletLedger = await dbGet('wallet_ledger');
    }
  }
  await dbSave('office_payments', record);
  appState.officePayments = await dbGet('office_payments');
  // If payment method is a vodafone office wallet type, record as outgoing in wallet ledger
  if (isOfficeVodafone) {
    const wEntry = {
      id:generateId(), date, direction:'out',
      category:'صادر مكتب - '+(record.category||'مصروف'),
      counterparty:'', invoice_serial:record.reference||'',
      amount, method:record.method, balance:0,
      notes:record.notes||('مصروف فودافون كاش - '+(record.category||'')),
      source_id:record.id,
      created_at:new Date().toISOString()
    };
    await dbSave('wallet_ledger', wEntry);
    appState.walletLedger = await dbGet('wallet_ledger');
    // Ensure entry persisted despite potential Supabase column mismatch
    ensureStateEntry(wEntry, appState.walletLedger);
    recalculateWalletBalances();
  }
  closeModal();
  showToast(id?'تم تحديث المصروف':'تم تسجيل المصروف بنجاح','success');
  logActivity(id ? 'تعديل مصروف مكتب' : 'إضافة مصروف مكتب', 'صادر المكتب', (id?'تعديل':'إضافة')+' مصروف بمبلغ '+formatCurrency(amount)+' - '+(record.category||''));
  renderOfficePayments();
}
function deleteOfficePayment(id) {
  showConfirm('هل تريد حذف هذا المصروف؟', async function(){
    const pay = appState.officePayments.find(p=>p.id===id);
    // Remove any linked wallet entry for this office payment
    const relatedWalletEntries = appState.walletLedger.filter(e=>e.source_id===id);
    if (relatedWalletEntries.length>0) {
      await Promise.all(relatedWalletEntries.map(e=>dbDelete('wallet_ledger', e.id)));
      appState.walletLedger = await dbGet('wallet_ledger');
      recalculateWalletBalances();
    }
    await dbDelete('office_payments', id);
    appState.officePayments = await dbGet('office_payments');
    const details = pay ? 'حذف مصروف مكتب: '+(pay.category?pay.category+' - ':'')+formatCurrency(pay.amount)+(pay.date?' ('+pay.date+')':'') : 'حذف سجل (غير موجود): '+id;
    logActivity('حذف مصروف مكتب', 'صادر المكتب', details);
    showToast('تم حذف المصروف','success');
    renderOfficePayments();
  });
}

async function saveAgentDiscountRate(editId) {
  const pctRaw = document.getElementById('adr-pct')?.value;
  const dateFrom = document.getElementById('adr-from')?.value;
  const dateTo = document.getElementById('adr-to')?.value;
  const notes = document.getElementById('adr-notes')?.value.trim()||'';
  const custCat = document.getElementById('adr-cat')?.value||'';
  const errEl = document.getElementById('adr-err');
  errEl.style.display='none';
  if (!pctRaw || pctRaw==='') { errEl.style.display='block'; errEl.textContent='يرجى إدخال نسبة المشاركة'; return; }
  const pct = parseFloat(pctRaw);
  if (isNaN(pct) || pct < 0 || pct > 100) { errEl.style.display='block'; errEl.textContent='نسبة المشاركة يجب أن تكون بين 0 و 100'; return; }
  if (!dateFrom) { errEl.style.display='block'; errEl.textContent='يرجى اختيار تاريخ البداية'; return; }
  if (!dateTo) { errEl.style.display='block'; errEl.textContent='يرجى اختيار تاريخ النهاية'; return; }
  if (dateTo < dateFrom) { errEl.style.display='block'; errEl.textContent='تاريخ النهاية يجب أن يكون بعد تاريخ البداية'; return; }
  // Check for date range overlaps within the same customer_category only
  const existing = (appState.agentDiscountRates||[]).filter(r=>r.id!==editId && (r.customer_category||'') === custCat);
  const overlap = existing.find(r => dateFrom <= r.date_to && dateTo >= r.date_from);
  if (overlap) {
    errEl.style.display='block';
    errEl.textContent='الفترة الزمنية المحددة تتداخل مع حركة مسجّلة'+(custCat?' لنفس التصنيف':'')+' ('+formatDate(overlap.date_from)+' – '+formatDate(overlap.date_to)+')';
    return;
  }
  const record = {
    id: editId || generateId(),
    discount_pct: pct,
    date_from: dateFrom,
    date_to: dateTo,
    customer_category: custCat,
    notes,
    created_at: editId ? ((appState.agentDiscountRates||[]).find(r=>r.id===editId)?.created_at || new Date().toISOString()) : new Date().toISOString()
  };
  await dbSave('agent_discount_rates', record);
  appState.agentDiscountRates = await dbGet('agent_discount_rates');
  closeModal();
  const catLabel = custCat ? ' ('+custCat+')' : ' (الكل)';
  const action = editId ? 'تعديل نسبة شريك' : 'إضافة نسبة شريك';
  logActivity(action, 'نسب الشركاء', 'نسبة '+pct+'%'+catLabel+' من '+formatDate(dateFrom)+' إلى '+formatDate(dateTo));
  showToast(editId ? 'تم تعديل نسبة الشريك بنجاح' : 'تمت إضافة نسبة الشريك بنجاح', 'success');
  renderAgentDiscountRates();
}

function deleteAgentDiscountRate(id) {
  const r = (appState.agentDiscountRates||[]).find(x=>x.id===id);
  showConfirm('هل تريد حذف هذه النسبة؟ سيؤدي ذلك إلى عدم احتساب الأرباح للفواتير في هذه الفترة.', async function(){
    await dbDelete('agent_discount_rates', id);
    appState.agentDiscountRates = await dbGet('agent_discount_rates');
    logActivity('حذف نسبة شريك', 'نسب الشركاء', r ? 'نسبة '+r.discount_pct+'% من '+formatDate(r.date_from)+' إلى '+formatDate(r.date_to) : 'حذف سجل: '+id);
    showToast('تم حذف نسبة الشريك بنجاح', 'success');
    renderAgentDiscountRates();
  });
}

function getAgentDiscountForDate(dateStr, customerCategory) {
  const rates = appState.agentDiscountRates || [];
  // If no rates configured, or no date, fall back to the single setting value
  if (rates.length === 0 || !dateStr) return appState.settings.agentDiscount || 0;
  const d = dateStr.substring(0, 10);
  const cat = customerCategory || '';
  // First: exact match on date range + customer category
  const exactMatch = rates.find(r => r.date_from <= d && r.date_to >= d && (r.customer_category||'') === cat);
  if (exactMatch !== undefined) return exactMatch.discount_pct;
  // Second: if searching for a specific category, fall back to rates covering all categories
  if (cat !== '') {
    const fallback = rates.find(r => r.date_from <= d && r.date_to >= d && (r.customer_category||'') === '');
    if (fallback !== undefined) return fallback.discount_pct;
  }
  // No matching rate found — fall back to the default setting
  return appState.settings.agentDiscount || 0;
}
function calcInvFactoryCost(inv, agentDisc) {
  return (inv.gross_amount || inv.net_amount || 0) * (1 - agentDisc / 100);
}
// Always recalculate factory cost dynamically from current agent discount rates
// to avoid displaying stale stored values when discount rates have changed.
function getInvFactoryCost(inv) {
  const custCat = appState.customers.find(c=>c.id===inv.customer_id)?.category||'';
  const disc = getAgentDiscountForDate(inv.date, custCat);
  return calcInvFactoryCost(inv, disc);
}
function renderProfitsContent() {
  const from = document.getElementById('profit-from')?.value;
  const to = document.getElementById('profit-to')?.value;
  const el = document.getElementById('profits-content');
  if (!el) return;
  const fromD = from ? new Date(from) : new Date('2000-01-01');
  const toD = to ? new Date(to+'T23:59:59') : new Date();
  const activeInvoices = appState.invoices.filter(inv=>
    inv.status!=='cancelled' && new Date(inv.date)>=fromD && new Date(inv.date)<=toD
  );
  const totalNetSales = activeInvoices.reduce((s,inv)=>s+(inv.net_amount||0),0);
  const totalFactoryCost = activeInvoices.reduce((s,inv)=>s+getInvFactoryCost(inv),0);
  const totalProfit = totalNetSales - totalFactoryCost;
  const profitMarginPct = totalNetSales > 0 ? (totalProfit/totalNetSales*100).toFixed(1) : 0;
  const summaryHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:20px;">'
    +'<div class="stat-card" style="border-right-color:#5D5CDE"><div style="font-size:0.8rem;color:#6b7280;">إجمالي المبيعات</div><div style="font-size:1.1rem;font-weight:700;color:#5D5CDE;">'+formatCurrency(totalNetSales)+'</div></div>'
    +'<div class="stat-card" style="border-right-color:#6b7280"><div style="font-size:0.8rem;color:#6b7280;">تكلفة البضاعة</div><div style="font-size:1.1rem;font-weight:700;">'+formatCurrency(totalFactoryCost)+'</div></div>'
    +'<div class="stat-card" style="border-right-color:#10b981"><div style="font-size:0.8rem;color:#6b7280;">صافي الأرباح</div><div style="font-size:1.3rem;font-weight:700;color:#10b981;">'+formatCurrency(totalProfit)+'</div></div>'
    +'<div class="stat-card" style="border-right-color:#f59e0b"><div style="font-size:0.8rem;color:#6b7280;">نسبة هامش الربح</div><div style="font-size:1.3rem;font-weight:700;color:#f59e0b;">'+profitMarginPct+'%</div></div>'
    +'<div class="stat-card" style="border-right-color:#8b5cf6"><div style="font-size:0.8rem;color:#6b7280;">عدد الفواتير</div><div style="font-size:1.1rem;font-weight:700;color:#8b5cf6;">'+activeInvoices.length+'</div></div>'
    +'</div>';
  if (profitsTab === 'overview') {
    const months = {};
    activeInvoices.forEach(inv=>{
      const mo = inv.date?.substring(0,7);
      if (mo) {
        if (!months[mo]) months[mo]={sales:0,factory:0,profit:0};
        months[mo].sales += inv.net_amount||0;
        const factoryCost = getInvFactoryCost(inv);
        months[mo].factory += factoryCost;
        months[mo].profit += (inv.net_amount||0) - factoryCost;
      }
    });
    const labels = Object.keys(months).sort();
    destroyChart('profitChart');
    el.innerHTML = summaryHtml
      +'<div class="card"><h3 class="section-title">الأرباح الشهرية</h3>'
      +'<canvas id="profitChart" height="100"></canvas></div>';
    setTimeout(()=>{
      const ctx = document.getElementById('profitChart');
      if (!ctx || !labels.length) return;
      const isDark = appState.isDarkMode;
      const tickColor = isDark ? '#d1d5db' : '#374151';
      const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)';
      const legendColor = isDark ? '#d1d5db' : '#374151';
      appState.chartInstances.profitChart = new Chart(ctx, {
        type:'bar',
        data:{ labels, datasets:[
          {label:'صافي المبيعات', data:labels.map(l=>months[l].sales), backgroundColor:'rgba(93,92,222,0.7)'},
          {label:'تكلفة البضاعة', data:labels.map(l=>months[l].factory), backgroundColor:'rgba(239,68,68,0.5)'},
          {label:'الأرباح', data:labels.map(l=>months[l].profit), backgroundColor:'rgba(16,185,129,0.8)'}
        ]},
        options:{responsive:true, plugins:{legend:{labels:{color:legendColor}}}, scales:{y:{beginAtZero:true, ticks:{color:tickColor}, grid:{color:gridColor}}, x:{ticks:{color:tickColor}, grid:{color:gridColor}}}}
      });
    },100);
  } else if (profitsTab === 'byInvoice') {
    const sorted = [...activeInvoices].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const cust = appState.customers;
    let rows = sorted.map(inv=>{
      const custObj = cust.find(c=>c.id===inv.customer_id);
      const custDisc = custObj ? (custObj.discount_rate||0) : 0;
      const agentDisc = getAgentDiscountForDate(inv.date, custObj?.category||'');
      const factoryCost = getInvFactoryCost(inv);
      const profit = (inv.net_amount||0) - factoryCost;
      const marginPct = inv.net_amount>0 ? (profit/inv.net_amount*100).toFixed(1) : '0.0';
      const netMarginPct = (agentDisc - custDisc).toFixed(1);

      +'<th>صافي المبيعات</th><th>تكلفة البضاعة</th><th>الربح</th><th>هامش الربح%</th>'
      +'<th>هامش الربح الصافي%</th>'
      +'</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  } else if (profitsTab === 'byCustomer') {
    const custMap = {};
    activeInvoices.forEach(inv=>{
      const c = inv.customer_id;
      if (!custMap[c]) custMap[c] = {name:inv.customer_name,sales:0,factory:0,profit:0,count:0};
      custMap[c].sales += inv.net_amount||0;
      const factoryCost = getInvFactoryCost(inv);
      custMap[c].factory += factoryCost;
      custMap[c].profit += (inv.net_amount||0) - factoryCost;
      custMap[c].count++;
    });
    const custRows = Object.values(custMap).sort((a,b)=>b.profit-a.profit).map(c=>{

      return '<tr>'
        +'<td style="font-weight:600;">'+escHtml(c.name)+'</td>'
        +'<td>'+c.count+'</td>'
        +'<td>'+formatCurrency(c.sales)+'</td>'
        +'<td>'+formatCurrency(c.factory)+'</td>'
        +'<td style="font-weight:700;color:#10b981;">'+formatCurrency(c.profit)+'</td>'
        +'<td style="font-weight:700;color:#f59e0b;">'+m+'%</td>'
        +'</tr>';
    }).join('') || '<tr><td colspan="6" style="text-align:center;color:#9ca3af;">لا توجد بيانات</td></tr>';
    el.innerHTML = summaryHtml
      +'<div class="card" style="padding:0;overflow:hidden;"><div style="overflow-x:auto;">'
      +'<table class="table-hover"><thead><tr>'
      +'<th>العميل</th><th>عدد الفواتير</th><th>إجمالي المبيعات</th><th>تكلفة البضاعة</th><th>الربح</th><th>هامش الربح%</th>'
      +'</tr></thead><tbody>'+custRows+'</tbody></table></div></div>';
  }
}

function generateStmtReport() {
  const custId = document.getElementById('rpt-cust')?.value;

  const to = document.getElementById('rpt-to')?.value;
  const el = document.getElementById('stmt-report-result');

  const cust = appState.customers.find(c=>c.id===custId);
  const fromD = from ? new Date(from) : new Date('2000-01-01');
  const toD = to ? new Date(to+'T23:59:59') : new Date();
  let entries = [];
  if (cust.opening_balance>0 && new Date(cust.created_at)<=toD) {
    entries.push({date:cust.created_at?.split('T')[0]||'',type:'رصيد افتتاحي',ref:'',debit:cust.opening_balance,credit:0});
  }
  appState.invoices.filter(i=>i.customer_id===custId && i.status!=='cancelled' && new Date(i.date)>=fromD && new Date(i.date)<=toD)
    .forEach(inv=>entries.push({date:inv.date,type:'فاتورة',ref:inv.serial,debit:inv.net_amount,credit:0}));
  appState.collections.filter(c=>c.customer_id===custId && new Date(c.date)>=fromD && new Date(c.date)<=toD)
    .forEach(col=>entries.push({date:col.date,type:'تحصيل',ref:getMethodLabel(col.method),debit:0,credit:col.amount}));
  appState.writeoffs.filter(w=>w.customer_id===custId && new Date(w.date)>=fromD && new Date(w.date)<=toD)
    .forEach(wo=>wo.amount>0
      ? entries.push({date:wo.date,type:'تصفية معدومة',ref:wo.notes||'',debit:0,credit:wo.amount})
      : entries.push({date:wo.date,type:'تصفية معدومة',ref:wo.notes||'',debit:Math.abs(wo.amount),credit:0}));
  entries.sort((a,b)=>new Date(a.date)-new Date(b.date));

      +'<td style="color:#ef4444;">'+(e.debit>0?formatCurrency(e.debit):'-')+'</td>'
      +'<td style="color:#10b981;">'+(e.credit>0?formatCurrency(e.credit):'-')+'</td>'
      +'<td style="font-weight:700;color:'+(running>0?'#ef4444':'#10b981')+';">'+formatCurrency(running)+'</td></tr>';
  });
  el.innerHTML = '<div style="display:flex;justify-content:space-between;margin-bottom:16px;align-items:center;">'
    +'<h4 style="font-weight:700;">'+cust.name+' | '+formatDate(from)+' - '+formatDate(to)+'</h4>'

    +'<tbody>'+rows+'</tbody></table></div>'
    +'<div style="margin-top:12px;background:#f9fafb;padding:12px;border-radius:8px;display:flex;justify-content:space-between;">'
    +'<span style="font-weight:700;">الرصيد النهائي:</span>'
    +'<span style="font-weight:700;font-size:1.1rem;color:'+(running>0?'#ef4444':'#10b981')+';">'+formatCurrency(running)+'</span>'
    +'</div>';
}

function renderAgingReport() {
  const now = new Date();
  const rows = appState.customers.filter(c=>c.status==='active').map(c=>{
    const bal = getCustomerBalance(c.id);
    if (bal<=0) return null;
    let b0=0,b30=0,b60=0,b90=0;
    const activeInvs = appState.invoices.filter(i=>i.customer_id===c.id && i.status!=='cancelled');
    const totalCols = appState.collections.filter(col=>col.customer_id===c.id).reduce((s,col)=>s+(col.amount||0),0);
    let remaining = c.opening_balance + activeInvs.reduce((s,i)=>s+(i.net_amount||0),0) - totalCols;
    const sorted = [...activeInvs].sort((a,b)=>new Date(a.date)-new Date(b.date));
    if (c.opening_balance>0) sorted.unshift({date:c.created_at?.split('T')[0]||now.toISOString().split('T')[0], net_amount:c.opening_balance});
    sorted.forEach(inv=>{
      if (remaining<=0) return;
      const invDate = new Date(inv.date);
      const days = Math.floor((now-invDate)/(1000*60*60*24));
      const take = Math.min(remaining, inv.net_amount||0);
      remaining -= take;
      if (days<=30) b0+=take; else if (days<=60) b30+=take; else if (days<=90) b60+=take; else b90+=take;
    });
    return {name:c.name, area:c.area, b0, b30, b60, b90, total:bal};
  }).filter(Boolean);
  rows.sort((a,b)=>b.total-a.total);
  const tot = {b0:0,b30:0,b60:0,b90:0,total:0};
  rows.forEach(r=>{ tot.b0+=r.b0; tot.b30+=r.b30; tot.b60+=r.b60; tot.b90+=r.b90; tot.total+=r.total; });
  const ageBadge = (v,cls) => v>0?'<span class="'+cls+'">'+formatCurrency(v)+'</span>':'-';
  let tableRows = rows.map(r=>'<tr><td style="font-weight:600;">'+r.name+'</td><td>'+( r.area||'-')+'</td>'
    +'<td>'+ageBadge(r.b0,'age-0')+'</td>'
    +'<td>'+ageBadge(r.b30,'age-30')+'</td>'
    +'<td>'+ageBadge(r.b60,'age-60')+'</td>'
    +'<td>'+ageBadge(r.b90,'age-90')+'</td>'
    +'<td style="font-weight:700;font-size:1rem;color:#ef4444;">'+formatCurrency(r.total)+'</td>'
    +'</tr>').join('');
  document.getElementById('report-content').innerHTML = '<div class="card">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">'
    +'<h3 class="section-title" style="margin:0;">تقرير تقادم الديون</h3>'
    +'<button onclick="exportAgingPDF()" class="btn-primary" style="font-size:0.8rem;"><i class="fas fa-file-pdf me-1"></i> تصدير PDF</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">'
    +'<div style="text-align:center;padding:12px;background:#d1fae5;border-radius:8px;"><div style="font-size:0.75rem;color:#065f46;">0-30 يوم</div><div style="font-weight:700;color:#065f46;">'+formatCurrency(tot.b0)+'</div></div>'
    +'<div style="text-align:center;padding:12px;background:#fef3c7;border-radius:8px;"><div style="font-size:0.75rem;color:#92400e;">31-60 يوم</div><div style="font-weight:700;color:#92400e;">'+formatCurrency(tot.b30)+'</div></div>'
    +'<div style="text-align:center;padding:12px;background:#fed7aa;border-radius:8px;"><div style="font-size:0.75rem;color:#c2410c;">61-90 يوم</div><div style="font-weight:700;color:#c2410c;">'+formatCurrency(tot.b60)+'</div></div>'
    +'<div style="text-align:center;padding:12px;background:#fee2e2;border-radius:8px;"><div style="font-size:0.75rem;color:#991b1b;">أكثر من 90 يوم</div><div style="font-weight:700;color:#991b1b;">'+formatCurrency(tot.b90)+'</div></div>'
    +'</div>'
    +'<div style="overflow-x:auto;">'
    +'<table class="table-hover"><thead><tr>'
    +'<th>العميل</th><th>المنطقة</th><th class="age-0">0-30 يوم</th><th class="age-30">31-60 يوم</th><th class="age-60">61-90 يوم</th><th class="age-90">90+ يوم</th><th>الإجمالي</th>'
    +'</tr></thead><tbody>'+tableRows+'</tbody>'
    +'<tfoot><tr style="background:#f9fafb;font-weight:700;">'
    +'<td colspan="2">الإجمالي</td>'
    +'<td>'+formatCurrency(tot.b0)+'</td>'
    +'<td>'+formatCurrency(tot.b30)+'</td>'
    +'<td>'+formatCurrency(tot.b60)+'</td>'
    +'<td>'+formatCurrency(tot.b90)+'</td>'
    +'<td style="color:#ef4444;font-size:1rem;">'+formatCurrency(tot.total)+'</td>'
    +'</tr></tfoot>'
    +'</table></div></div>';
}

// ==================== EMPLOYEE REPORT ====================
function renderEmployeeReport() {
  if (!canDo('employeeReport','view')) {
    document.getElementById('page-content').innerHTML='<div class="card" style="text-align:center;padding:40px;"><i class="fas fa-lock" style="font-size:48px;color:#d1d5db;"></i><p style="margin-top:16px;color:#6b7280;">ليس لديك صلاحية الوصول لهذه الصفحة</p></div>';
    return;
  }
  const now = new Date();
  const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0');
  const defaultFrom = y+'-01-01';
  const defaultTo = y+'-'+m+'-'+String(now.getDate()).padStart(2,'0');
  const fromVal = appState.filters.employeeReportFrom || defaultFrom;
  const toVal = appState.filters.employeeReportTo || defaultTo;
  const repFilter = appState.filters.employeeReportRep || '';

  const allUsers = [...new Set(appState.invoices.filter(i=>i.created_by||i.sales_rep).map(i=>i.created_by||i.sales_rep))].sort();
  const repOpts = '<option value="">كل المستخدمين</option>'+allUsers.map(r=>'<option value="'+escHtml(r)+'" '+(repFilter===r?'selected':'')+'>'+escHtml(r)+'</option>').join('');

  // Filter invoices by date range and status
  let filtered = appState.invoices.filter(inv => {
    if (inv.status === 'cancelled') return false;
    if (fromVal && inv.date < fromVal) return false;
    if (toVal && inv.date > toVal) return false;
    if (repFilter && (inv.created_by||inv.sales_rep||'') !== repFilter) return false;
    return true;
  });

  // Group by created_by (the actual user who entered the invoice)
  const repMap = {};
  filtered.forEach(inv => {
    const rep = inv.created_by || inv.sales_rep || 'غير محدد';
    if (!repMap[rep]) repMap[rep] = {name:rep, count:0, gross:0, disc:0, net:0, factory:0};
    repMap[rep].count++;
    repMap[rep].gross += (inv.gross_amount||0);
    repMap[rep].disc += (inv.discount_amount||0);
    repMap[rep].net += (inv.net_amount||0);
    repMap[rep].factory += getInvFactoryCost(inv);
  });
  let reps = Object.values(repMap);
  reps.forEach(r => { r.profit = r.net - r.factory; r.margin = r.net > 0 ? ((r.profit/r.net)*100).toFixed(1) : '0.0'; });
  reps.sort((a,b)=>b.net-a.net);

  const totalGross = filtered.reduce((s,i)=>s+(i.gross_amount||0),0);
  const totalDisc = filtered.reduce((s,i)=>s+(i.discount_amount||0),0);
  const totalNet = filtered.reduce((s,i)=>s+(i.net_amount||0),0);
  const totalFactory = filtered.reduce((s,inv)=>s+getInvFactoryCost(inv),0);
  const totalProfit = totalNet - totalFactory;
  const totalCount = filtered.length;

  const topSeller = reps.length > 0 ? reps[0] : null;
  const topByCount = reps.length > 0 ? [...reps].sort((a,b)=>b.count-a.count)[0] : null;

  let html = '<div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">'
    +'<h3 style="font-size:1.1rem;font-weight:700;margin:0;"><i class="fas fa-user-tie me-2" style="color:#5D5CDE;"></i> تقرير الموظفين</h3>'
    +'</div>';

  // Filters
  html += '<div class="card" style="padding:16px;margin-bottom:16px;">'
    +'<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">'
    +'<div><label style="font-size:0.8rem;color:#6b7280;display:block;margin-bottom:4px;">من تاريخ</label>'
    +'<input type="date" class="form-input" value="'+fromVal+'" oninput="appState.filters.employeeReportFrom=this.value;renderEmployeeReport()"></div>'
    +'<div><label style="font-size:0.8rem;color:#6b7280;display:block;margin-bottom:4px;">إلى تاريخ</label>'
    +'<input type="date" class="form-input" value="'+toVal+'" oninput="appState.filters.employeeReportTo=this.value;renderEmployeeReport()"></div>'
    +'<div><label style="font-size:0.8rem;color:#6b7280;display:block;margin-bottom:4px;">المستخدم</label>'
    +'<select class="form-input" onchange="appState.filters.employeeReportRep=this.value;renderEmployeeReport()">'+repOpts+'</select></div>'
    +((appState.filters.employeeReportFrom||appState.filters.employeeReportTo||appState.filters.employeeReportRep)?'<button onclick="appState.filters.employeeReportFrom=\'\';appState.filters.employeeReportTo=\'\';appState.filters.employeeReportRep=\'\';renderEmployeeReport()" class="btn-reset" style="align-self:flex-end;"><i class="fas fa-times"></i> إعادة تعيين</button>':'')
    +'</div></div>';

  // Summary cards
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:16px;">'
    +'<div class="stat-card" style="border-right-color:#5D5CDE"><div style="font-size:0.8rem;color:#6b7280;">إجمالي المبيعات</div><div style="font-weight:700;font-size:1rem;color:#5D5CDE;">'+formatCurrency(totalGross)+'</div><div style="font-size:0.75rem;color:#9ca3af;">'+totalCount+' فاتورة</div></div>'
    +'<div class="stat-card" style="border-right-color:#10b981"><div style="font-size:0.8rem;color:#6b7280;">صافي المبيعات</div><div style="font-weight:700;font-size:1rem;color:#10b981;">'+formatCurrency(totalNet)+'</div></div>'
    +'<div class="stat-card" style="border-right-color:#f59e0b"><div style="font-size:0.8rem;color:#6b7280;">إجمالي الخصومات</div><div style="font-weight:700;font-size:1rem;color:#f59e0b;">'+formatCurrency(totalDisc)+'</div></div>'
    +'<div class="stat-card" style="border-right-color:#8b5cf6"><div style="font-size:0.8rem;color:#6b7280;">إجمالي الأرباح</div><div style="font-weight:700;font-size:1rem;color:#8b5cf6;">'+formatCurrency(totalProfit)+'</div></div>'
    +'</div>';

  // Top sellers badges
  if (topSeller || topByCount) {
    html += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;">';
    if (topSeller) html += '<div style="background:linear-gradient(135deg,#5D5CDE,#8b5cf6);color:white;padding:12px 20px;border-radius:12px;display:flex;align-items:center;gap:10px;">'
      +'<i class="fas fa-trophy" style="font-size:1.4rem;color:#fbbf24;"></i>'
      +'<div><div style="font-size:0.75rem;opacity:0.85;">أعلى مبيعات (صافي)</div><div style="font-weight:700;font-size:1rem;">'+escHtml(topSeller.name)+'</div><div style="font-size:0.8rem;opacity:0.9;">'+formatCurrency(topSeller.net)+'</div></div></div>';
    if (topByCount && topByCount.name !== (topSeller?.name||'')) html += '<div style="background:linear-gradient(135deg,#10b981,#059669);color:white;padding:12px 20px;border-radius:12px;display:flex;align-items:center;gap:10px;">'
      +'<i class="fas fa-star" style="font-size:1.4rem;color:#fbbf24;"></i>'
      +'<div><div style="font-size:0.75rem;opacity:0.85;">أكثر فواتير</div><div style="font-weight:700;font-size:1rem;">'+escHtml(topByCount.name)+'</div><div style="font-size:0.8rem;opacity:0.9;">'+topByCount.count+' فاتورة</div></div></div>';
    html += '</div>';
  }

  // Per-employee table
  if (reps.length === 0) {
    html += '<div class="card" style="text-align:center;padding:40px;"><i class="fas fa-user-slash" style="font-size:48px;color:#d1d5db;"></i><p style="margin-top:16px;color:#6b7280;">لا توجد بيانات للفترة المحددة</p></div>';
  } else {
    html += '<div class="card" style="padding:0;overflow:hidden;margin-bottom:16px;"><div style="padding:12px 16px;background:#f9fafb;border-bottom:1px solid #e5e7eb;font-weight:600;font-size:0.9rem;"><i class="fas fa-table me-2" style="color:#5D5CDE;"></i>ملخص أداء المستخدمين</div><div style="overflow-x:auto;">'
      +'<table class="table-hover"><thead><tr>'
      +'<th>#</th><th>المستخدم</th><th>عدد الفواتير</th><th>إجمالي المبيعات</th><th>الخصومات</th><th>صافي المبيعات</th><th>تكلفة البضاعة</th><th>الربح</th><th>هامش الربح%</th><th>نسبة من الإجمالي</th>'
      +'</tr></thead><tbody>';
    reps.forEach((r,idx) => {
      const pct = totalNet > 0 ? ((r.net/totalNet)*100).toFixed(1) : '0.0';
      const isTop = idx === 0;
      html += '<tr style="'+(isTop?'background:#fffbeb;':'')+'"><td style="color:#9ca3af;">'+(idx+1)+'</td>'
        +'<td style="font-weight:600;">'+(isTop?'<i class="fas fa-crown" style="color:#f59e0b;margin-left:4px;"></i>':'')+escHtml(r.name)+'</td>'
        +'<td><span style="background:#ede9fe;color:#5D5CDE;padding:2px 8px;border-radius:6px;font-size:0.8rem;">'+r.count+'</span></td>'
        +'<td>'+formatCurrency(r.gross)+'</td>'
        +'<td style="color:#f59e0b;">'+formatCurrency(r.disc)+'</td>'
        +'<td style="font-weight:600;color:#5D5CDE;">'+formatCurrency(r.net)+'</td>'
        +'<td>'+formatCurrency(r.factory)+'</td>'
        +'<td style="color:'+(r.profit>=0?'#10b981':'#ef4444')+';font-weight:600;">'+formatCurrency(r.profit)+'</td>'
        +'<td><span style="background:'+(parseFloat(r.margin)>=20?'#d1fae5':'#fef3c7')+';color:'+(parseFloat(r.margin)>=20?'#065f46':'#92400e')+';padding:2px 8px;border-radius:6px;font-size:0.8rem;">'+r.margin+'%</span></td>'
        +'<td><div style="display:flex;align-items:center;gap:6px;"><div style="height:6px;background:#e5e7eb;border-radius:3px;flex:1;min-width:60px;"><div style="height:6px;background:#5D5CDE;border-radius:3px;width:'+pct+'%;"></div></div><span style="font-size:0.75rem;color:#6b7280;">'+pct+'%</span></div></td>'
        +'</tr>';
    });
    html += '</tbody><tfoot><tr style="background:#f9fafb;font-weight:700;">'
      +'<td colspan="2" style="padding:10px 12px;">الإجمالي</td>'
      +'<td>'+totalCount+'</td>'
      +'<td>'+formatCurrency(totalGross)+'</td>'
      +'<td style="color:#f59e0b;">'+formatCurrency(totalDisc)+'</td>'
      +'<td style="color:#5D5CDE;">'+formatCurrency(totalNet)+'</td>'
      +'<td>'+formatCurrency(totalFactory)+'</td>'
      +'<td style="color:'+(totalProfit>=0?'#10b981':'#ef4444')+';">'+formatCurrency(totalProfit)+'</td>'
      +'<td colspan="2"></td>'
      +'</tr></tfoot></table></div></div>';
  }

  // Detailed invoice table per rep (collapsible)
  if (!repFilter && reps.length > 0) {
    html += '<div class="card" style="padding:0;overflow:hidden;"><div style="padding:12px 16px;background:#f9fafb;border-bottom:1px solid #e5e7eb;font-weight:600;font-size:0.9rem;"><i class="fas fa-list me-2" style="color:#5D5CDE;"></i>تفاصيل الفواتير حسب المستخدم</div>';
    reps.forEach(r => {
      const repInvs = filtered.filter(i=>(i.created_by||i.sales_rep||'غير محدد')===r.name).sort((a,b)=>new Date(b.date)-new Date(a.date));
      html += '<div style="border-bottom:1px solid #f3f4f6;">'
        +'<div style="padding:10px 16px;background:#f9fafb;cursor:pointer;display:flex;align-items:center;justify-content:space-between;" onclick="toggleRepDetails(this)">'
        +'<span style="font-weight:600;">'+escHtml(r.name)+' <span style="color:#6b7280;font-size:0.85rem;">('+r.count+' فاتورة)</span></span>'
        +'<i class="fas fa-chevron-down" style="color:#6b7280;font-size:0.8rem;"></i>'
        +'</div>'
        +'<div style="display:none;overflow-x:auto;"><table class="table-hover" style="font-size:0.85rem;"><thead><tr>'
        +'<th>رقم الفاتورة</th><th>التاريخ</th><th>العميل</th><th>الإجمالي</th><th>الخصم</th><th>الصافي</th><th>الربح</th>'
        +'</tr></thead><tbody>';
      repInvs.forEach(inv => {
        const factoryCost = getInvFactoryCost(inv);
        const profit = (inv.net_amount||0) - factoryCost;
        html += '<tr><td style="font-family:monospace;font-size:0.8rem;">'+escHtml(inv.serial)+'</td>'
          +'<td>'+formatDate(inv.date)+'</td>'
          +'<td>'+escHtml(inv.customer_name)+'</td>'
          +'<td>'+formatCurrency(inv.gross_amount)+'</td>'
          +'<td style="color:#f59e0b;">'+formatCurrency(inv.discount_amount)+'</td>'
          +'<td style="font-weight:600;color:#5D5CDE;">'+formatCurrency(inv.net_amount)+'</td>'
          +'<td style="color:'+(profit>=0?'#10b981':'#ef4444')+';">'+formatCurrency(profit)+'</td>'
          +'</tr>';
      });
      html += '</tbody></table></div></div>';
    });
    html += '</div>';
  }

  document.getElementById('page-content').innerHTML = html;
}

async function updateOrderStatus(id, newStatus) {
  const inv = appState.invoices.find(i=>i.id===id);
  if (!inv) return;
  inv.delivery_status = newStatus;
  await dbSave('invoices', inv);
  appState.invoices = await dbGet('invoices');
  logActivity('تحديث حالة الطلب', 'تتبع الطلبات', 'الفاتورة: '+inv.serial+' → '+(newStatus==='in_progress'?'قيد التشغيل':'تم التسليم'));
  showToast('تم تحديث حالة الطلب إلى '+(newStatus==='in_progress'?'قيد التشغيل':'تم التسليم'),'success');
  renderOrderTracking();
}

function saveSystemSettings() {
  appState.settings.companyName = document.getElementById('set-company')?.value.trim()||'';
  appState.settings.currency = document.getElementById('set-currency')?.value.trim()||'ج.م';
  appState.settings.defaultDiscount = parseFloat(document.getElementById('set-disc')?.value)||0;
  appState.settings.openingWalletBalance = parseFloat(document.getElementById('set-opening-wal')?.value)||0;
  appState.settings.autoLogoutMinutes = parseInt(document.getElementById('set-autologout')?.value);
  if (isNaN(appState.settings.autoLogoutMinutes)) appState.settings.autoLogoutMinutes = 15;
  appState.settings.autoRefreshSeconds = parseInt(document.getElementById('set-auto-refresh')?.value);
  if (isNaN(appState.settings.autoRefreshSeconds) || appState.settings.autoRefreshSeconds < 10) appState.settings.autoRefreshSeconds = 30;
  appState.settings.activityLogRetentionDays = parseInt(document.getElementById('set-log-retention')?.value);
  if (isNaN(appState.settings.activityLogRetentionDays)) appState.settings.activityLogRetentionDays = 30;
  dbSaveSettings(appState.settings);
  // Recalculate wallet balances immediately so the new opening balance is reflected
  recalculateWalletBalances();
  // Restart inactivity timer with updated settings
  startInactivityTimer();
  // Restart auto-refresh with updated interval
  startAutoRefresh();
  logActivity('تعديل إعدادات النظام', 'الإعدادات', 'تم حفظ إعدادات النظام');
  showToast('تم حفظ الإعدادات بنجاح','success');
}

function saveCustomerCategories() {
  const val = document.getElementById('set-custcats')?.value||'';
  const cats = val.split('\n').map(s=>s.trim()).filter(Boolean);
  if (cats.length===0) { showToast('يجب إضافة تصنيف واحد على الأقل','error'); return; }
  appState.settings.customerCategories = cats;
  dbSaveSettings(appState.settings);
  showToast('تم حفظ تصنيفات العملاء ('+cats.length+' تصنيف)','success');
}
function savePaymentMethods() {
  const val = document.getElementById('set-methods')?.value||'';
  const methods = val.split('\n').map(s=>s.trim()).filter(Boolean).map(line=>{
    const idx = line.indexOf(':');
    if (idx<0) return null;
    return {value:line.substring(0,idx).trim(), label:line.substring(idx+1).trim()};
  }).filter(Boolean);
  if (methods.length===0) { showToast('يجب إضافة طريقة دفع واحدة على الأقل','error'); return; }
  appState.settings.paymentMethods = methods;
  dbSaveSettings(appState.settings);

}

function saveSupabaseConfig() {

  const serviceKey = document.getElementById('sb-service-key')?.value.trim();
  lsSet('supabase_config', {url, key, serviceKey});

  if (url && key && window.supabase) {
    try {
      supabaseClient = window.supabase.createClient(url, key);

      if (serviceKey) {
        supabaseAdminClient = window.supabase.createClient(url, serviceKey, {
          auth: { autoRefreshToken: false, persistSession: false }
        });
      }
      showToast('تم حفظ إعدادات Supabase','success');
    } catch(e) { showToast('خطأ في إنشاء الاتصال','error'); }
  } else { showToast('تم حفظ الإعدادات (بدون اتصال)','info'); }

async function testSupabaseConnection() {
  const url = document.getElementById('sb-url')?.value.trim();
  const key = document.getElementById('sb-key')?.value.trim();
  const serviceKey = document.getElementById('sb-service-key')?.value.trim();
  const el = document.getElementById('sb-result');
  if (!url||!key) { if(el) el.innerHTML='<span style="color:#ef4444;">يرجى إدخال الـ URL والـ Key</span>'; return; }
  if(el) el.innerHTML='<span class="spinner"></span> جاري الاختبار...';
  try {
    // Use persistSession:false to avoid creating a conflicting GoTrueClient instance
    const testClient = window.supabase.createClient(url, key, {
      auth: { persistSession: false, autoRefreshToken: false }
    });
    const {data,error} = await testClient.from('customers').select('count').limit(1);
    if (error && error.code!=='PGRST116') throw error;
    // Test succeeded — update the main client so it uses the new credentials
    supabaseClient = null; supabaseAdminClient = null; appState.supabaseConfigured = false;
    lsSet('supabase_config', { url, key, serviceKey: serviceKey || (lsGet('supabase_config')||{}).serviceKey || '' });
    initSupabaseClient();
    if (serviceKey && supabaseClient) {
      supabaseAdminClient = window.supabase.createClient(url, serviceKey, {
        auth: { autoRefreshToken: false, persistSession: false }
      });
    }
    if(el) el.innerHTML='<span style="color:#10b981;font-weight:700;"><i class="fas fa-check-circle me-1"></i> الاتصال ناجح!'+(serviceKey?' (مع Service Role Key)':'')+'</span>';
  } catch(e) {
    if(el) el.innerHTML='<span style="color:#ef4444;"><i class="fas fa-times-circle me-1"></i> فشل الاتصال: '+( e.message||'خطأ غير معروف')+'</span>';
  }
}

async function syncUsersToSupabaseAuth() {
  const el = document.getElementById('sb-result');
  if (!supabaseAdminClient) {
    if(el) el.innerHTML='<span style="color:#ef4444;"><i class="fas fa-times-circle me-1"></i> يرجى إدخال Service Role Key أولاً وحفظ الإعدادات.</span>';
    return;
  }
  if(el) el.innerHTML='<span class="spinner"></span> جاري مزامنة المستخدمين...';
  const users = appState.users.length ? appState.users : [];
  let authOk = 0, authSkipped = 0, authFailed = 0, profileOk = 0, profileFailed = 0;
  try {
    const { data: listData } = await supabaseAdminClient.auth.admin.listUsers();
    const existingEmails = new Set((listData?.users || []).map(u => u.email));
    for (const u of users) {
      if (!u.email) { authSkipped++; continue; }
      if (!existingEmails.has(u.email)) {
        if (!u.password) { authSkipped++; }
        else {
          try {
            const { error } = await supabaseAdminClient.auth.admin.createUser({ email: u.email, password: u.password, email_confirm: true });
            if (error) { authFailed++; } else { authOk++; existingEmails.add(u.email); }
          } catch(e) { authFailed++; }
        }
      } else { authSkipped++; }
      // Always push the user profile record to the users table (use email as stable conflict key)
      if (supabaseClient && appState.supabaseConfigured) {
        try {
          const { error } = await supabaseClient.from('users').upsert({
            email: u.email, name: u.name, role: u.role,
            status: u.status || 'active',
            custom_perms: u.custom_perms || null,
            custom_pages: u.custom_pages || null
          }, { onConflict: 'email' });
          if (!error) profileOk++; else profileFailed++;
        } catch(e) { profileFailed++; }
      }
    }
  } catch(e) {
    if(el) el.innerHTML='<span style="color:#ef4444;"><i class="fas fa-times-circle me-1"></i> فشل الاتصال بـ Supabase Auth: '+(e.message||'')+'</span>';
    return;
  }
  if(el) el.innerHTML='<span style="color:#10b981;font-weight:700;"><i class="fas fa-check-circle me-1"></i> اكتملت المزامنة: Auth: '+authOk+' مضاف، '+authSkipped+' موجود مسبقاً، '+authFailed+' فشل | سجلات: '+profileOk+' تم حفظها، '+profileFailed+' فشل.</span>';
}

async function createFirstSupabaseUser() {
  const el = document.getElementById('sb-first-result');
  const email = document.getElementById('sb-first-email')?.value.trim();
  const pass  = document.getElementById('sb-first-pass')?.value;
  const name  = document.getElementById('sb-first-name')?.value.trim() || email?.split('@')[0];
  const role  = document.getElementById('sb-first-role')?.value || 'admin';
  if (!email || !pass) {
    if(el) el.innerHTML='<span style="color:#ef4444;">يرجى إدخال البريد الإلكتروني وكلمة المرور.</span>';
    return;
  }
  if (pass.length < 6) {
    if(el) el.innerHTML='<span style="color:#ef4444;">كلمة المرور يجب أن تكون 6 أحرف على الأقل.</span>';
    return;
  }
  if (!supabaseClient || !appState.supabaseConfigured) {
    if(el) el.innerHTML='<span style="color:#ef4444;">يرجى إدخال Supabase URL و Anon Key وحفظ الإعدادات أولاً.</span>';
    return;
  }
  if(el) el.innerHTML='<span class="spinner"></span> جاري الإنشاء...';
  try {
    // Use signUp (works without Service Role Key, but requires email confirmation disabled)
    const { data: signUpData, error: signUpErr } = await supabaseClient.auth.signUp({ email, password: pass });
    if (signUpErr) throw signUpErr;
    const authId = signUpData?.user?.id || generateId();

    if(el) el.innerHTML='<span style="color:#10b981;font-weight:700;"><i class="fas fa-check-circle me-1"></i> تم إنشاء المستخدم بنجاح! يمكنك الآن تسجيل الدخول بهذا البريد وكلمة المرور من أي متصفح.</span>'
      +(signUpData?.user?.identities?.length===0?'<br><small style="color:#f59e0b;">ملاحظة: يبدو أن المستخدم موجود مسبقاً في Supabase Auth.</small>':'');
  } catch(e) {
    const msg = e.message || '';
    let hint = '';
    if (msg.toLowerCase().includes('email') && msg.toLowerCase().includes('confirm')) {
      hint = '<br><small style="color:#6b7280;">تلميح: اذهب إلى Supabase Dashboard → Authentication → Providers → Email → أوقف "Confirm email" ثم حاول مرة أخرى.</small>';
    } else if (msg.toLowerCase().includes('already registered') || msg.toLowerCase().includes('user already')) {
      hint = '<br><small style="color:#6b7280;">هذا البريد الإلكتروني مسجل مسبقاً في Supabase Auth. يمكنك تسجيل الدخول به مباشرةً.</small>';
    }
    if(el) el.innerHTML='<span style="color:#ef4444;"><i class="fas fa-times-circle me-1"></i> فشل الإنشاء: '+escHtml(msg)+'</span>'+hint;
  }

function saveRolePerms(role) {
  if (role === 'admin') {
    // Admin always has full access
    if (!appState.settings.rolePerms) appState.settings.rolePerms = {};
    appState.settings.rolePerms['admin'] = DEFAULT_ROLE_PERMS['admin'];
    appState.settings.roleMenus = appState.settings.roleMenus || {};
    appState.settings.roleMenus['admin'] = [...ALL_PAGES];
    dbSaveSettings(appState.settings);
    showToast('صلاحيات المدير ثابتة وكاملة', 'info');
    return;
  }
  const checkboxes = document.querySelectorAll('input[data-role="'+role+'"]');
  const perms = {};
  checkboxes.forEach(cb=>{
    const page = cb.dataset.page, op = cb.dataset.op;
    if (!perms[page]) perms[page] = {};
    perms[page][op] = cb.checked;
  });
  // Derive allowed pages (where view=true) for backward compat
  const allowedPages = ALL_PAGES.filter(p=>perms[p]&&perms[p].view);
  if (!appState.settings.rolePerms) appState.settings.rolePerms = {};
  if (!appState.settings.roleMenus) appState.settings.roleMenus = {};
  appState.settings.rolePerms[role] = perms;
  appState.settings.roleMenus[role] = allowedPages;
  dbSaveSettings(appState.settings);
  showToast('تم حفظ صلاحيات دور '+getRoleLabel(role), 'success');
}
function onRoleViewToggle(cb, role, page) {
  const ops = PAGE_OPERATIONS[page] || ['view'];

  ops.forEach(op=>{
    if (op === 'view') return;
    const el = document.querySelector('input[data-role="'+role+'"][data-page="'+page+'"][data-op="'+op+'"]');
    if (el) { el.disabled = !viewChecked; if (!viewChecked) el.checked = false; }
  });
}

function saveNewRole() {
  const label = document.getElementById('role-label')?.value.trim();
  const id = (document.getElementById('role-id')?.value.trim()||'').replace(/\s+/g,'_').toLowerCase();
  const copyFrom = document.getElementById('role-copy-from')?.value;
  const errEl = document.getElementById('role-err');
  if (!label) { errEl.style.display='block'; errEl.textContent='يرجى إدخال اسم الدور'; return; }
  if (!id) { errEl.style.display='block'; errEl.textContent='يرجى إدخال معرّف الدور'; return; }
  if (!/^[a-z][a-z0-9_]*$/.test(id)) { errEl.style.display='block'; errEl.textContent='المعرّف: حروف إنجليزية صغيرة، أرقام، شرطة سفلية فقط'; return; }
  if (getAllRoles().find(r=>r.id===id)) { errEl.style.display='block'; errEl.textContent='هذا المعرّف مستخدم بالفعل'; return; }
  if (!appState.settings.customRoles) appState.settings.customRoles = [];
  appState.settings.customRoles.push({id, label, builtin:false});
  if (copyFrom) {
    const srcPerms = getRolePerms(copyFrom);
    if (!appState.settings.rolePerms) appState.settings.rolePerms = {};
    appState.settings.rolePerms[id] = JSON.parse(JSON.stringify(srcPerms));
    const srcPages = getUserAllowedPages({role:copyFrom});
    if (!appState.settings.roleMenus) appState.settings.roleMenus = {};
    appState.settings.roleMenus[id] = [...srcPages];
  }
  dbSaveSettings(appState.settings);
  closeModal();
  showToast('تم إضافة الدور: '+label, 'success');
  renderUsersSettings();
}
function deleteCustomRole(roleId) {
  const activeUsersWithRole = appState.users.filter(u=>u.role===roleId && u.status==='active');
  if (activeUsersWithRole.length > 0) {
    showToast('لا يمكن حذف الدور: يوجد '+activeUsersWithRole.length+' مستخدم(ين) نشط بهذا الدور. قم بتغيير دور المستخدم أو إلغاء تنشيطه أولاً', 'error');
    return;
  }
  showConfirm('هل تريد حذف دور "'+getRoleLabel(roleId)+'"؟ سيتم حذف الدور وجميع الصلاحيات المرتبطة به نهائياً.', function(){
    appState.settings.customRoles = (appState.settings.customRoles||[]).filter(r=>r.id!==roleId);
    if (appState.settings.rolePerms) delete appState.settings.rolePerms[roleId];
    if (appState.settings.roleMenus) delete appState.settings.roleMenus[roleId];
    dbSaveSettings(appState.settings);
    showToast('تم حذف الدور وجميع صلاحياته بنجاح', 'success');
    renderUsersSettings();
  });
}

function toggleUserPermsUI() {
  const cb = document.getElementById('usr-custom-perms');
  const wrapper = document.getElementById('usr-perms-wrapper');
  const note = document.getElementById('usr-pages-note');
  if (wrapper) wrapper.style.display = cb?.checked ? 'block' : 'none';
  if (note) note.textContent = cb?.checked ? '' : 'الصلاحيات مبنية على الدور المختار';
}
function onUserViewToggle(cb, page) {
  const ops = PAGE_OPERATIONS[page] || ['view'];
  const viewChecked = cb.checked;
  ops.forEach(op=>{
    if (op === 'view') return;
    const el = document.querySelector('.usr-perm-cb[data-page="'+page+'"][data-op="'+op+'"]');
    if (el) { el.disabled = !viewChecked; if (!viewChecked) el.checked = false; }
  });
}
function toggleCustomPagesUI() {
  // Legacy shim – now delegates to toggleUserPermsUI
  toggleUserPermsUI();
}
function onUserRoleChange() {
  const role = document.getElementById('usr-role')?.value;
  const useCustom = document.getElementById('usr-custom-perms')?.checked;
  if (!useCustom) return;
  // Refresh CRUD matrix checkboxes to new role defaults
  const rolePerms = getRolePerms(role);
  ALL_PAGES.forEach(p=>{
    const ops = PAGE_OPERATIONS[p] || ['view'];
    const rp = rolePerms[p] || {};
    ops.forEach(op=>{
      const el = document.querySelector('.usr-perm-cb[data-page="'+p+'"][data-op="'+op+'"]');
      if (el) { el.checked = !!rp[op]; el.disabled = (op!=='view' && !rp.view); }
    });
  });
}
async function saveUser(id) {
  const name = document.getElementById('usr-name')?.value.trim();
  const email = document.getElementById('usr-email')?.value.trim();
  const pass = document.getElementById('usr-pass')?.value;
  const errEl = document.getElementById('usr-err');
  if (!name) { errEl.style.display='block'; errEl.textContent='يرجى إدخال الاسم'; return; }
  if (!email) { errEl.style.display='block'; errEl.textContent='يرجى إدخال البريد الإلكتروني'; return; }
  if (!id && !pass) { errEl.style.display='block'; errEl.textContent='يرجى إدخال كلمة المرور'; return; }
  const existing = id ? appState.users.find(u=>u.id===id) : null;
  // Collect custom CRUD perms if enabled
  const useCustomPerms = document.getElementById('usr-custom-perms')?.checked;
  let customPerms = null;
  let customPages = null;
  if (useCustomPerms) {
    customPerms = {};
    ALL_PAGES.forEach(p=>{
      const ops = PAGE_OPERATIONS[p] || ['view'];
      customPerms[p] = {};
      ops.forEach(op=>{
        const el = document.querySelector('.usr-perm-cb[data-page="'+p+'"][data-op="'+op+'"]');
        customPerms[p][op] = el ? el.checked : false;
      });
    });
    // Derive customPages from customPerms (pages with view=true)
    customPages = ALL_PAGES.filter(p=>customPerms[p]&&customPerms[p].view);
  }
  // Determine the record id: for edits use existing id; for new users try to get auth UUID first
  let recordId = id || generateId();
  // Sync to Supabase Auth if admin client is available
  if (supabaseAdminClient) {
    try {
      if (!id) {
        // New user: create in Supabase Auth FIRST to get the real auth UUID
        const { data: authData, error: authErr } = await supabaseAdminClient.auth.admin.createUser({ email, password: pass, email_confirm: true });
        if (authErr) throw authErr;
        if (authData?.user?.id) recordId = authData.user.id;
      } else if (pass) {
        // Password changed: find Supabase Auth user by email and update password
        const { data: listData } = await supabaseAdminClient.auth.admin.listUsers();
        const authUser = (listData?.users || []).find(u => u.email === email);
        if (authUser) {
          await supabaseAdminClient.auth.admin.updateUserById(authUser.id, { password: pass });
        } else {
          const { data: authData } = await supabaseAdminClient.auth.admin.createUser({ email, password: pass, email_confirm: true });
          if (authData?.user?.id && !id) recordId = authData.user.id;
        }
      }
    } catch(e) {
      showToast('تحذير: لم يتم مزامنة المستخدم مع Supabase Auth - ' + (e.message||''), 'warning');
    }
  }
  const record = {
    id: recordId, name, email,
    password: pass || (existing?.password||''),
    role: document.getElementById('usr-role')?.value || (getAllRoles()[0]?.id || 'admin'),
    status: document.getElementById('usr-status')?.value||'active',
    custom_perms: customPerms, custom_pages: customPages
  };
  // Use admin client to save profile (bypasses RLS) if available, otherwise fall back to regular client
  if (supabaseAdminClient && supabaseClient && appState.supabaseConfigured) {
    try {
      const sbRecord = normalizeUserForDB(record);
      const { error } = await supabaseAdminClient.from('users').upsert(sbRecord);
      if (error) {
        console.warn('[saveUser] فشل حفظ المستخدم:', error?.message || error);
        _showDbSaveError();
      }
    } catch(e) {
      console.warn('[saveUser] خطأ في حفظ المستخدم:', e?.message || e);
      _showDbSaveError();
    }
  } else {
    await dbSave('users', record);
  }
  appState.users = await dbGet('users');
  // Ensure the new record appears even if dbGet returned stale data
  if (!appState.users.find(u=>u.id===record.id)) appState.users.unshift(record);
  // Update current user session if editing self
  if (id && appState.currentUser.id === id) {
    appState.currentUser = {...appState.currentUser, ...record};
    renderSidebar();
  }
  closeModal();
  showToast(id?'تم تحديث المستخدم':'تم إضافة المستخدم بنجاح','success');
  logActivity(id ? 'تعديل مستخدم' : 'إضافة مستخدم', 'المستخدمين', (id?'تعديل':'إضافة')+' مستخدم: '+name+' ('+record.role+')');
  renderUsersSettings();
}
function deleteUser(id) {
  showConfirm('هل تريد حذف هذا المستخدم؟', async function(){
    const user = appState.users.find(u=>u.id===id);
    await dbDelete('users', id);
    appState.users = await dbGet('users');
    logActivity('حذف مستخدم', 'المستخدمين', 'حذف: '+(user?.name||id)+' ('+( user?.role||'')+')');
    showToast('تم حذف المستخدم','success');
    renderUsersSettings();
  });
}

// Normalize a user record from backup JSON for Supabase upsert:
// maps camelCase field names to snake_case and removes password (stored only in Auth).
function normalizeUserForDB(u) {
  if (!u || typeof u !== 'object') return u;
  const r = {...u};
  if ('customPages' in r) { r.custom_pages = r.customPages; delete r.customPages; }
  if ('customPerms' in r) { r.custom_perms = r.customPerms; delete r.customPerms; }
  delete r.password;
  return r;
}
// Normalize a customer record for Supabase upsert: convert date fields to ISO format.
function normalizeCustomerForDB(c) {
  if (!c || typeof c !== 'object') return c;
  const r = {...c};
  if (r.joining_date) { r.joining_date = parseImportDate(r.joining_date) || null; }
  return r;
}
// Normalize any table row before Supabase upsert.
function normalizeRowForDB(tableKey, row) {
  if (!row || typeof row !== 'object') return row;
  if (tableKey === 'users') return normalizeUserForDB(row);
  if (tableKey === 'customers') return normalizeCustomerForDB(row);
  return row;
}

      showToast('خطأ في قراءة الملف: '+err.message,'error');

  reader.readAsText(file);
