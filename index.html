// ==================== CUSTOMER MERGE ====================
async function mergeCustomerAccounts() {
  function normalizeAr(s) {
    return (s||'').trim()
      .replace(/[أإآ]/g,'ا')
      .replace(/ة/g,'ه')
      .replace(/ى/g,'ي')
      .replace(/\s+/g,' ');
  }
  const customers = appState.customers;
  const merges = [];
  customers.forEach(c => {
    const name = (c.name||'').trim();
    // Pattern 1: "X تبع Y" → primary is customer named "Y"
    const TABAA = ' تبع ';
    const tabaaIdx = name.indexOf(TABAA);
    if (tabaaIdx !== -1) {
      const primaryName = name.slice(tabaaIdx + TABAA.length).trim();
      const primary = customers.find(p => p.id !== c.id && normalizeAr(p.name) === normalizeAr(primaryName));
      if (primary) {
        merges.push({ subId: c.id, primaryId: primary.id, subName: c.name, primaryName: primary.name });
        return;
      }
    }
    // Pattern 2: "X 2", "X 3", ... → primary is customer named "X"
    const numMatch = name.match(/^(.+?)\s+(\d+)$/);
    if (numMatch) {
      const primaryName = numMatch[1].trim();
      const primary = customers.find(p => p.id !== c.id && normalizeAr(p.name) === normalizeAr(primaryName));
      if (primary) {
        merges.push({ subId: c.id, primaryId: primary.id, subName: c.name, primaryName: primary.name });
      }
    }
  });
  if (merges.length === 0) {
    showToast('لم يُعثر على حسابات قابلة للدمج (لا يوجد عملاء بصيغة "تبع" أو أرقام مطابقة).', 'info');
    return;
  }
  const confirmMsg = 'سيتم دمج الحسابات الفرعية التالية مع الحسابات الأصلية:\n'
    + merges.map(m => '• ' + m.subName + '  →  ' + m.primaryName).join('\n')
    + '\n\nستُنقل جميع الفواتير والتحصيلات والرصيد الافتتاحي إلى الحساب الأصلي ويُعطَّل الحساب الفرعي.\nهل تريد المتابعة؟';
  showConfirm(confirmMsg, async function() {
    for (const { subId, primaryId } of merges) {
      const primaryCust = appState.customers.find(c => c.id === primaryId);
      const subCust = appState.customers.find(c => c.id === subId);
      if (!primaryCust || !subCust) continue;
      // Reassign invoices from sub to primary
      const subInvoices = appState.invoices.filter(i => i.customer_id === subId);
      for (const inv of subInvoices) {
        await dbSave('invoices', { ...inv, customer_id: primaryId, customer_name: primaryCust.name });
      }
      // Reassign collections from sub to primary
      const subCols = appState.collections.filter(col => col.customer_id === subId);
      for (const col of subCols) {
        await dbSave('collections', { ...col, customer_id: primaryId, customer_name: primaryCust.name });
      }
      // Transfer sub opening_balance to primary (handles both positive and negative values)
      if (Math.abs(subCust.opening_balance||0) > 0) {
        const updatedPrimary = { ...primaryCust, opening_balance: (primaryCust.opening_balance||0) + subCust.opening_balance };
        await dbSave('customers', updatedPrimary);
        const idx = appState.customers.findIndex(c => c.id === primaryId);
        if (idx >= 0) appState.customers[idx] = updatedPrimary;
      }
      // Deactivate sub-customer and zero its opening_balance
      const updatedSub = { ...subCust, opening_balance: 0, status: 'inactive' };
      await dbSave('customers', updatedSub);
      const sidx = appState.customers.findIndex(c => c.id === subId);
      if (sidx >= 0) appState.customers[sidx] = updatedSub;
    }
    appState.customers = await dbGet('customers');
    appState.invoices = await dbGet('invoices');
    appState.collections = await dbGet('collections');
    showToast('تم دمج ' + merges.length + ' حساب فرعي بنجاح', 'success');
    logActivity('دمج حسابات العملاء', 'العملاء', 'تم دمج ' + merges.length + ' حساب فرعي مع الحسابات الأصلية');
    renderCustomers();
  });
}

async function settleOldSystemBalances() {
  // القائمة المعتمدة: كل عميل باسمه والمديونية المستهدفة
  const APPROVED_LIST = [
    { key: 'حلمي',               target: 23850   },
    { key: 'حاتم فرج',           target: 49290   },
    { key: 'عزت قطب',            target: 110900  },
    { key: 'محمود كليب',         target: 6210    },
    { key: 'عادل فتوح',          target: 9780    },
    { key: 'ايمن مجاهد',         target: 130910  },
    { key: 'ايه عبد الرسول',     target: 2937    },
    { key: 'تامر توفيق',         target: 12210   },
    { key: 'كونسلت',             target: 41100   },
    { key: 'امين عمار',          target: 3240    },
    { key: 'احمد عماد',          target: 8290    },
  ];
  function findApproved(name) {
    const n = (name||'').trim();
    return APPROVED_LIST.find(e => n.includes(e.key));
  }
  const toZero   = [];
  const toAdjust = [];
  appState.customers.forEach(c => {
    const bal = getCustomerBalance(c.id);
    const entry = findApproved(c.name);
    if (entry) {
      const diff = Math.round((bal - entry.target) * 100) / 100;
      if (Math.abs(diff) > 0.01) toAdjust.push({ cust: c, bal, target: entry.target, diff });
    } else {
      if (bal > 0.01) toZero.push({ cust: c, bal });
    }
  });
  if (toZero.length === 0 && toAdjust.length === 0) {
    showToast('لا توجد تعديلات مطلوبة. جميع الأرصدة مطابقة للقائمة المعتمدة.', 'info');
    return;
  }
  let msg = '';
  if (toZero.length > 0) {
    msg += 'تصفير مديونيات ' + toZero.length + ' عميل (سداد سيستم قديم):\n'
      + toZero.map(e => '• ' + e.cust.name + ' (' + e.bal.toFixed(2) + ')').join('\n');
  }
  if (toAdjust.length > 0) {
    if (msg) msg += '\n\n';
    msg += 'تعديل مديونيات ' + toAdjust.length + ' عميل لمطابقة القائمة المعتمدة:\n'
      + toAdjust.map(e => '• ' + e.cust.name + ': ' + e.bal.toFixed(2) + ' → ' + e.target
          + (e.diff > 0 ? ' (سداد ' + e.diff.toFixed(2) + ')' : ' (إضافة ' + Math.abs(e.diff).toFixed(2) + ')')).join('\n');
  }
  msg += '\n\nهل تريد المتابعة؟';
  showConfirm(msg, async function() {
    const today = new Date().toISOString().split('T')[0];
    // Zero-out non-approved customers
    for (const { cust, bal } of toZero) {
      if (bal <= 0.01) continue;
      await dbSave('collections', {
        id: generateId(), date: today,
        customer_id: cust.id, customer_name: cust.name,
        invoice_serial: '', amount: bal, method: 'cash', employee: '',
        notes: 'سداد سيستم قديم', created_at: new Date().toISOString()
      });
    }
    // Adjust approved customers to match their target amounts
    for (const { cust, bal, target, diff } of toAdjust) {
      if (diff > 0.01) {
        // Balance > target → add collection to reduce balance
        await dbSave('collections', {
          id: generateId(), date: today,
          customer_id: cust.id, customer_name: cust.name,
          invoice_serial: '', amount: diff, method: 'cash', employee: '',
          notes: 'سداد سيستم قديم', created_at: new Date().toISOString()
        });
      } else if (diff < -0.01) {
        // Balance < target → increase opening_balance to add the missing amount
        const updated = { ...cust, opening_balance: (cust.opening_balance||0) + Math.abs(diff) };
        await dbSave('customers', updated);
        const idx = appState.customers.findIndex(c => c.id === cust.id);
        if (idx >= 0) appState.customers[idx] = updated;
      }
    }
    appState.customers = await dbGet('customers');
    appState.collections = await dbGet('collections');
    showToast('تمت التسوية: ' + toZero.length + ' عميل تم تصفيره، ' + toAdjust.length + ' عميل تم تعديله', 'success');
    logActivity('تسوية مديونيات السيستم القديم', 'التحصيلات',
      'تصفير: ' + toZero.length + ' عميل | تعديل: ' + toAdjust.length + ' عميل');
  });
}
async function settleOldPeriodByInvoiceDate() {
  const CUTOFF = '2026-03-23';
  // Build per-customer list: active invoices up to cutoff date
  const custMap = {};
  appState.invoices.forEach(inv => {
    if (inv.status === 'cancelled') return;
    if ((inv.date || '') > CUTOFF) return;
    if (!custMap[inv.customer_id]) custMap[inv.customer_id] = [];
    custMap[inv.customer_id].push(inv);
  });
  // For each customer compute current balance; skip if already zero or negative
  const toSettle = [];
  Object.keys(custMap).forEach(custId => {
    const cust = appState.customers.find(c => c.id === custId);
    if (!cust) return;
    const bal = getCustomerBalance(custId);
    if (bal <= 0.01) return;
    const invs = custMap[custId];
    if (invs.length === 0) return;
    toSettle.push({ cust, bal, invs });
  });
  if (toSettle.length === 0) {
    showToast('لا توجد تحصيلات مطلوبة. جميع الأرصدة صفر أو سالبة.', 'info');
    return;
  }
  const totalCols = toSettle.reduce((s, e) => s + e.invs.length, 0);
  const msg = 'سيتم تسجيل ' + totalCols + ' تحصيل لـ ' + toSettle.length + ' عميل بتاريخ كل فاتورة حتى ' + CUTOFF + ':\n\n'
    + toSettle.map(e =>
        '• ' + e.cust.name + ' — رصيد: ' + e.bal.toFixed(2)
        + ' ÷ ' + e.invs.length + ' فاتورة = '
        + (e.bal / e.invs.length).toFixed(2) + ' لكل فاتورة'
      ).join('\n')
    + '\n\nهل تريد المتابعة؟';
  showConfirm(msg, async function() {
    let created = 0;
    for (const { cust, bal, invs } of toSettle) {
      const perInvoice = Math.round((bal / invs.length) * 100) / 100;
      // Distribute any rounding remainder to the last invoice
      let remaining = Math.round(bal * 100) / 100;
      for (let i = 0; i < invs.length; i++) {
        const inv = invs[i];
        const isLast = i === invs.length - 1;
        const amount = isLast ? Math.round(remaining * 100) / 100 : perInvoice;
        if (amount <= 0) continue;
        remaining = Math.round((remaining - amount) * 100) / 100;
        await dbSave('collections', {
          id: generateId(),
          date: inv.date,
          customer_id: cust.id,
          customer_name: cust.name,
          invoice_serial: inv.serial || '',
          amount,
          method: 'none',
          employee: '',
          notes: 'تسوية فترة قديمة',
          created_at: new Date().toISOString()
        });
        created++;
      }
    }
    appState.collections = await dbGet('collections');
    showToast('تمت التسوية: ' + created + ' تحصيل لـ ' + toSettle.length + ' عميل', 'success');
    logActivity('تسوية تحصيلات الفترة القديمة', 'التحصيلات',
      'تسجيل ' + created + ' تحصيل لـ ' + toSettle.length + ' عميل حتى ' + CUTOFF);
    renderCollections();
  });
}

function clearSelectedData() {
  const DATA_TYPES = [
    {id:'del-customers',   keys:['customers'],                        stateKeys:['customers'],       defaultVal:[],  label:'عملاء'},
    {id:'del-products',    keys:['products'],                         stateKeys:['products'],        defaultVal:[],  label:'منتجات'},
    {id:'del-invoices',    keys:['invoices','invoice_items'],         stateKeys:['invoices','invoiceItems'], defaultVal:[], label:'فواتير'},
    {id:'del-collections', keys:['collections'],                      stateKeys:['collections'],     defaultVal:[],  label:'تحصيلات'},
    {id:'del-wallet',      keys:['wallet_ledger'],                    stateKeys:['walletLedger'],    defaultVal:[],  label:'محفظة (فودافون كاش)'},
    {id:'del-factory-payments', keys:['factory_payments'],           stateKeys:['factoryPayments'], defaultVal:[],  label:'دفعات الموردين'},
  ];
  const selected = DATA_TYPES.filter(m => document.getElementById(m.id)?.checked);
  if (!selected.length) { showToast('يرجى اختيار نوع بيانات واحد على الأقل','warning'); return; }
  const labels = selected.map(m => m.label).join('، ');
  showConfirm('⚠️ تحذير: سيتم حذف البيانات التالية بشكل نهائي ولا يمكن التراجع:\n' + labels + '\n\nهل أنت متأكد تماماً؟', async function() {
    // Remove from localStorage
    selected.forEach(item => item.keys.forEach(k => localStorage.removeItem(k)));
    // Reset appState
    selected.flatMap(item => item.stateKeys).forEach(sk => { appState[sk] = []; });
    // Remove from Supabase if configured
    if (supabaseClient && appState.supabaseConfigured) {
      let cloudError = false;
      const cloudTables = selected.flatMap(item => item.keys);
      for (const t of cloudTables) {
        try { await supabaseClient.from(t).delete().neq('id', null); } catch(e) { console.error('فشل حذف جدول '+t+':', e); cloudError = true; }
      }
      if (cloudError) showToast('تحذير: فشل حذف بعض البيانات من السحابة، تم مسح البيانات المحلية فقط','warning');
    }
    showToast('تم حذف البيانات المحددة نهائياً: ' + labels,'success');
    navigate('dashboard');
  });
}

async function saveBranch(editId) {
  const nameVal = document.getElementById('br-name')?.value.trim()||'';
  const errEl = document.getElementById('br-err');
  errEl.style.display='none';
  if (!nameVal) { errEl.style.display='block'; errEl.textContent='يرجى إدخال اسم الفرع'; return; }
  const id = (editId && editId!=='null') ? editId : generateId();
  const record = {
    id, name:nameVal,
    location:document.getElementById('br-location')?.value.trim()||'',
    manager:document.getElementById('br-manager')?.value.trim()||'',
    status:document.getElementById('br-status')?.value||'active',
    notes:document.getElementById('br-notes')?.value.trim()||'',
    created_at:(editId&&editId!=='null')?((appState.branches||[]).find(b=>b.id===editId)?.created_at||new Date().toISOString()):new Date().toISOString()
  };
  await dbSave('branches', record);
  appState.branches = await dbGet('branches');
  closeModal();
  logActivity((editId&&editId!=='null')?'تعديل فرع':'إضافة فرع', 'إدارة الفروع', record.name);
  showToast((editId&&editId!=='null')?'تم تعديل الفرع':'تمت إضافة الفرع بنجاح','success');
  renderBranches();
}

function deleteBranch(id) {
  const b = (appState.branches||[]).find(x=>x.id===id);
  showConfirm('هل تريد حذف هذا الفرع؟', async function(){
    await dbDelete('branches', id);
    appState.branches = await dbGet('branches');
    logActivity('حذف فرع', 'إدارة الفروع', b?.name||id);
    showToast('تم حذف الفرع','success');
    renderBranches();
  });
}

function downloadCsvTemplate(type) {
  let content = '';
  if (type === 'customers') {
    content = 'name,phone,whatsapp,area,address,category,joining_date,opening_balance,discount_rate,status\n';
    content += 'محمد أحمد للمقاولات,01012345678,01012345678,القاهرة,مدينة نصر,مقاولين,'+new Date().toISOString().split('T')[0]+',5000,5,active\n';
    content += 'شركة البناء الحديث,01123456789,,الجيزة,الهرم,هيئات,'+new Date().toISOString().split('T')[0]+',0,0,active\n';
  } else if (type === 'products') {
    content = 'name,category,unit,weight,factory_price,agent_price,description\n';
    content += 'دهان خارجي ممتاز,خارجي,لتر,4 كجم,45,55,دهان للواجهات الخارجية\n';
    content += 'دهان داخلي عادي,داخلي,لتر,10 كجم,22,28,\n';
  } else if (type === 'invoices') {
    content = 'invoice_ref,date,customer_name,sales_rep,notes,product_name,unit,qty,unit_price,discount,color\n';
    const today = new Date().toISOString().split('T')[0];
    content += 'INV-001,'+today+',محمد أحمد للمقاولات,أحمد علي,ملاحظات الفاتورة,دهان خارجي ممتاز,لتر,10,55,5,أبيض\n';
    content += 'INV-001,'+today+',محمد أحمد للمقاولات,أحمد علي,,دهان داخلي عادي,لتر,20,28,0,\n';
    content += 'INV-002,'+today+',شركة البناء الحديث,,,دهان خارجي ممتاز,لتر,5,55,0,رمادي\n';
  }
  const blob = new Blob(['\uFEFF'+content], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'template_'+type+'_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  showToast('تم تنزيل القالب بنجاح', 'success');
}
function parseCsvLine(line) {
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; } // escaped quote ""
      else { inQuote = !inQuote; }
    } else if (c === ',' && !inQuote) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim());
  return result;
}
function importCsv(type, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const text = e.target.result.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
      const lines = text.split('\n').filter(l=>l.trim());
      if (lines.length < 2) { showToast('الملف فارغ أو لا يحتوي على بيانات','error'); return; }
      const headers = parseCsvLine(lines[0]).map(h=>h.toLowerCase().trim().replace(/["'\s]/g,''));
      let imported = 0, skipped = 0, errors = [];
      const invoiceGroups = {};
      for (let i = 1; i < lines.length; i++) {
        const vals = parseCsvLine(lines[i]);
        const row = {};
        headers.forEach((h,idx)=>{ row[h] = (vals[idx]||'').trim(); });
        if (type === 'customers') {
          const name = row['name']||row['الاسم']||'';
          const phone = row['phone']||row['الهاتف']||'';
          if (!name) { errors.push('السطر '+(i+1)+': اسم العميل فارغ'); skipped++; continue; }
          if (appState.customers.find(c=>c.name.trim().toLowerCase()===name.trim().toLowerCase())) { skipped++; continue; }
          const joiningDate = (row['joining_date']||row['تاريخ_الانضمام']||'').trim() || new Date().toISOString().split('T')[0];
          const record = {
            id: generateId(), name,
            phone: phone,
            whatsapp: row['whatsapp']||row['واتساب']||'',
            area: row['area']||row['المنطقة']||'',
            address: row['address']||row['العنوان']||'',
            category: row['category']||row['التصنيف']||'',
            joining_date: joiningDate,
            opening_balance: parseFloat(row['opening_balance']||row['رصيد_افتتاحي']||0)||0,
            discount_rate: parseFloat(row['discount_rate']||row['خصم']||0)||0,
            status: (row['status']||row['الحالة']||'active').toLowerCase()==='inactive'?'inactive':'active',
            created_at: new Date().toISOString()
          };
          await dbSave('customers', record);
          appState.customers.push(record);
          imported++;
        } else if (type === 'products') {
          const name = row['name']||row['الاسم']||'';
          const ap = parseFloat(row['agent_price']||row['سعر_البيع']||0)||0;
          if (!name) { errors.push('السطر '+(i+1)+': اسم المنتج فارغ'); skipped++; continue; }
          if (appState.products.find(p=>p.name.trim().toLowerCase()===name.trim().toLowerCase())) { skipped++; continue; }
          const record = {
            id: generateId(), name,
            category: row['category']||row['الفئة']||'',
            unit: row['unit']||row['الوحدة']||'لتر',
            weight: row['weight']||row['الوزن']||'',
            factory_price: parseFloat(row['factory_price']||row['سعر_المصنع']||0)||0,
            agent_price: ap,
            description: row['description']||row['الوصف']||'',
            created_at: new Date().toISOString()
          };
          await dbSave('products', record);
          appState.products.push(record);
          imported++;
        } else if (type === 'invoices') {
          const ref = (row['invoice_ref']||row['رقم_الفاتورة']||'').trim();
          const dateRaw = (row['date']||row['التاريخ']||'').trim();
          const date = parseImportDate(dateRaw);
          const custName = (row['customer_name']||row['اسم_العميل']||'').trim();
          const productName = (row['product_name']||row['المنتج']||'').trim();
          const qty = parseFloat(row['qty']||row['الكمية']||0)||0;
          if (!ref) { errors.push('السطر '+(i+1)+': رمز الفاتورة (invoice_ref) فارغ'); skipped++; continue; }
          if (!dateRaw) { errors.push('السطر '+(i+1)+': التاريخ فارغ'); skipped++; continue; }
          if (!date) { errors.push('السطر '+(i+1)+': التاريخ "'+dateRaw+'" غير صالح — يجب أن يكون بصيغة YYYY-MM-DD أو DD/MM/YYYY'); skipped++; continue; }
          if (!custName) { errors.push('السطر '+(i+1)+': اسم العميل فارغ'); skipped++; continue; }
          if (!productName) { errors.push('السطر '+(i+1)+': اسم المنتج فارغ'); skipped++; continue; }
          if (qty <= 0) { errors.push('السطر '+(i+1)+': الكمية يجب أن تكون أكبر من صفر'); skipped++; continue; }
          const cust = appState.customers.find(c=>c.name.trim().toLowerCase()===custName.toLowerCase());
          if (!cust) { errors.push('السطر '+(i+1)+': العميل "'+custName+'" غير موجود في النظام'); skipped++; continue; }
          const prod = appState.products.find(p=>p.name.trim().toLowerCase()===productName.toLowerCase());
          if (!prod) { errors.push('السطر '+(i+1)+': المنتج "'+productName+'" غير موجود في النظام'); skipped++; continue; }
          if (!invoiceGroups[ref]) {
            invoiceGroups[ref] = {
              date, customer_id: cust.id, customer_name: cust.name,
              sales_rep: (row['sales_rep']||row['المندوب']||'').trim(),
              notes: (row['notes']||row['ملاحظات']||'').trim(),
              items: []
            };
          }
          const unit_price = parseFloat(row['unit_price']||row['سعر_الوحدة']||prod.agent_price)||prod.agent_price;
          const discount = parseFloat(row['discount']||row['خصم']||0)||0;
          const unit = (row['unit']||row['الوحدة']||prod.unit||'لتر').trim();
          const color = (row['color']||row['اللون']||'').trim();
          const gross = qty * unit_price;
          const total = gross * (1 - discount / 100);
          invoiceGroups[ref].items.push({
            product_id: prod.id, product_name: prod.name, unit, qty,
            unit_price, discount, total, color
          });
        }
      }
      // Post-loop: save invoices groups
      if (type === 'invoices') {
        for (const ref of Object.keys(invoiceGroups)) {
          const g = invoiceGroups[ref];
          if (!g.items.length) continue;
          let gross=0, disc=0;
          g.items.forEach(it=>{ gross+=it.qty*it.unit_price; disc+=(it.qty*it.unit_price)-it.total; });
          const net = gross - disc;
          const custObjCsv = appState.customers.find(c=>c.id===g.customer_id);
          const agentDiscCsv = getAgentDiscountForDate(g.date, custObjCsv?.category||'');
          const factory = gross * (1 - agentDiscCsv / 100);
          const invId = generateId();
          const serial = generateInvoiceSerial();
          const invoice = {
            id:invId, serial, date:g.date, customer_id:g.customer_id, customer_name:g.customer_name,
            sales_rep:g.sales_rep, gross_amount:gross, discount_amount:disc, net_amount:net,
            factory_amount:factory, notes:g.notes, status:'active',
            created_by:appState.currentUser.name, created_at:new Date().toISOString()
          };
          await dbSave('invoices', invoice);
          appState.invoices.push(invoice);
          for (const it of g.items) {
            await dbSave('invoice_items', {
              id:generateId(), invoice_id:invId, product_id:it.product_id,
              product_name:it.product_name, unit:it.unit, qty:it.qty,
              unit_price:it.unit_price, factory_price:parseFloat((it.unit_price*(1-agentDiscCsv/100)).toFixed(4)), discount:it.discount, total:it.total, color:it.color
            });
          }
          imported++;
        }
        appState.invoiceItems = await dbGet('invoice_items');
      } else {
        // appState already updated in-memory by dbSave callers above
      }
      const resEl = document.getElementById('csv-'+type+'-result');
      const typeLabel = type==='customers'?'العملاء':type==='products'?'المنتجات':'الفواتير';
      const recordLabel = type==='customers'?'عميل':type==='products'?'منتج':'فاتورة';
      let resHtml = '<div style="padding:12px;border-radius:8px;font-size:0.85rem;">'
        +'<div style="background:#d1fae5;padding:10px;border-radius:6px;margin-bottom:8px;">'
        +'<i class="fas fa-check-circle" style="color:#10b981;"></i> تم استيراد <b>'+imported+'</b> سجل بنجاح، وتخطي <b>'+skipped+'</b> سجل (موجود أو ناقص).'
        +'</div>';
      if (errors.length > 0) resHtml += '<div style="background:#fee2e2;padding:10px;border-radius:6px;"><b>أخطاء:</b><ul style="margin:4px 0 0 0;padding-right:16px;">'+(errors.slice(0,5).map(e=>'<li>'+escHtml(e)+'</li>').join(''))+'</ul></div>';
      resHtml += '</div>';
      if (resEl) resEl.innerHTML = resHtml;
      if (imported > 0) {
        logActivity('استيراد CSV', typeLabel, 'استيراد '+imported+' سجل');
        showToast('تم استيراد '+imported+' '+recordLabel+' بنجاح','success');
        if (type === 'invoices') renderInvoices();
      } else {
        showToast('لم يتم استيراد أي سجلات جديدة','warning');
      }
    } catch(err) { showToast('خطأ في قراءة ملف CSV: '+err.message,'error'); }
  };
  reader.readAsText(file, 'UTF-8');
}

  seedDataIfEmpty();
  checkAuth();
  window.addEventListener('resize', function(){
    const mb = document.getElementById('mobile-menu-btn');
    if (mb) mb.style.display = window.innerWidth<769?'block':'none';
  });
});
</script>
